<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SPILL — vibe radar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--sf:#0f0f0f;--sfe:#141414;--bd:#222;--bd2:#2e2e2e;--tx:#f0ece6;--txs:#777;--ap:#ff2d55;--as:#00e5ff;--aq:#bfff00;--purple:#bf5af2;--sb:env(safe-area-inset-bottom);--st:env(safe-area-inset-top)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Syne',sans-serif;font-size:14px;position:fixed;width:100%}
.app{height:100%;display:flex;flex-direction:column;overflow:hidden}
.header{padding:14px 18px;padding-top:calc(14px + var(--st));display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--bd);background:var(--bg)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:34px}
.logo .x{color:var(--ap);display:inline-block;animation:spin 4s ease-in-out infinite}
@keyframes spin{0%,90%,100%{transform:rotate(0)}95%{transform:rotate(180deg)}}
.online-pill{font-family:'DM Mono',monospace;font-size:10px;color:#000;background:var(--aq);padding:5px 12px;border:2px solid #000;box-shadow:3px 3px 0 #000}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.radar-sect{background:var(--sf);border-bottom:2px solid var(--bd);padding:16px 18px}
.radar-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--as);letter-spacing:3px;margin-bottom:12px}
.radar-cont{position:relative;width:100%;aspect-ratio:1/1;background:#020a02;border:2px solid var(--bd2);box-shadow:6px 6px 0 #000}
.radar-grid{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,rgba(0,229,255,.04)0px,transparent 1px,transparent 28px),repeating-linear-gradient(90deg,rgba(0,229,255,.04)0px,transparent 1px,transparent 28px)}
.radar-ring{position:absolute;inset:8%;border:1px solid rgba(0,229,255,.08);border-radius:50%}
.radar-ring::before{content:'';position:absolute;border-radius:50%;border:1px solid rgba(0,229,255,.05);inset:28%}
.radar-cross{position:absolute;inset:0;background:linear-gradient(90deg,transparent calc(50% - .5px),rgba(0,229,255,.06) calc(50% - .5px),rgba(0,229,255,.06) calc(50% + .5px),transparent calc(50% + .5px)),linear-gradient(0deg,transparent calc(50% - .5px),rgba(0,229,255,.06) calc(50% - .5px),rgba(0,229,255,.06) calc(50% + .5px),transparent calc(50% + .5px))}
.btn-vibe-check{width:100%;background:var(--ap);border:2px solid #000;padding:18px;font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;cursor:pointer;box-shadow:5px 5px 0 #000;display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px}
.btn-whisper{width:100%;background:transparent;border:2px dashed var(--bd2);padding:14px;font-family:'Syne',sans-serif;font-size:13px;color:var(--txs);cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.filter-sect{padding:18px;border-bottom:2px solid var(--bd)}
.filter-title{font-family:'DM Mono',monospace;font-size:9px;color:var(--txs);margin-bottom:14px}
.match-pct{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--ap)}
.mood-scroll{display:flex;gap:8px;overflow-x:auto;margin:16px -18px 0;padding:0 18px}
.mood-chip{padding:8px 16px;background:var(--bg);border:2px solid var(--bd2);font-family:'DM Mono',monospace;font-size:11px;color:var(--txs);white-space:nowrap;cursor:pointer}
.mood-chip.active{background:var(--ap);border-color:#000;color:#fff}
.spills-sect{padding:18px;padding-bottom:calc(90px + var(--sb))}
.sect-title{font-family:'Bebas Neue',sans-serif;font-size:28px}
.spill-card{background:var(--sf);border:2px solid var(--bd2);margin-bottom:14px;box-shadow:4px 4px 0 #000}
.spill-card.is-mine{border-color:var(--as)}
.spill-head{display:flex;justify-content:space-between;padding:12px 16px;border-bottom:2px solid var(--bd);background:var(--bg)}
.spill-user{font-family:'DM Mono',monospace;font-size:11px;color:var(--txs)}
.spill-user.mine{color:var(--as)}
.spill-mood{font-family:'DM Mono',monospace;font-size:9px;padding:5px 10px;border:2px solid}
.spill-body{padding:16px;font-size:15px}
.spill-actions{display:flex;border-top:2px solid var(--bd);background:var(--bg)}
.react-btn{flex:1;padding:12px;background:transparent;border:none;border-right:2px solid var(--bd);font-size:16px;color:var(--txs);cursor:pointer}
.react-btn.active{background:var(--ap);color:#fff}
.refresh-btn{width:100%;padding:16px;background:transparent;border:2px dashed var(--bd2);color:var(--txs);display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;cursor:pointer}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:2px solid var(--bd);padding-bottom:var(--sb)}
.nav-container{display:flex;height:62px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--txm);text-decoration:none;font-family:'DM Mono',monospace;font-size:9px;border-right:2px solid var(--bd)}
.nav-item.active{color:var(--ap);background:rgba(255,45,85,.06)}
.nav-item.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--ap)}
.chat-room{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column}
.chat-room.on{display:flex}
.chat-head{padding:12px 18px;padding-top:calc(12px + var(--st));border-bottom:2px solid var(--bd);background:var(--sf);display:flex;justify-content:space-between}
.chat-timer{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--aq);background:var(--bg);padding:8px 14px;border:2px solid var(--bd)}
.chat-timer.warn{color:var(--ap);border-color:var(--ap)}
.chat-messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
.chat-bubble{max-width:85%;padding:12px 16px;font-size:15px;border:2px solid}
.own .chat-bubble{background:var(--ap);color:#fff;border-color:#000;align-self:flex-end}
.other .chat-bubble{background:var(--sf);border-color:var(--bd2)}
.system-msg{align-self:center!important;max-width:90%!important}
.system-msg .chat-bubble{background:transparent!important;border:2px dashed var(--bd)!important;color:var(--txs)!important}
.typing{display:flex;gap:5px;padding:14px 18px;background:var(--sf);border:2px solid var(--bd2);width:fit-content}
.typing-dot{width:7px;height:7px;background:var(--as);transform:rotate(45deg);animation:typi 1.4s infinite}
@keyframes typi{0%,60%,100%{transform:rotate(45deg) translateY(0)}30%{transform:rotate(45deg) translateY(-5px)}}
.chat-input-wrap{padding:12px 18px;padding-bottom:calc(12px + var(--sb));border-top:2px solid var(--bd);background:var(--sf);display:flex;gap:10px}
.chat-input{flex:1;background:var(--bg);border:2px solid var(--bd2);padding:13px 16px;font-size:15px;color:var(--tx);outline:none;font-family:'Syne',sans-serif}
.chat-send{width:48px;height:48px;background:var(--ap);border:2px solid #000;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;cursor:pointer}
.modal{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column}
.modal.on{display:flex}
.modal-header{padding:16px 18px;padding-top:calc(16px + var(--st));border-bottom:2px solid var(--bd);display:flex;justify-content:space-between}
.modal-close{width:38px;height:38px;background:var(--sf);border:2px solid var(--bd2);color:var(--txs);cursor:pointer}
.modal-body{flex:1;overflow-y:auto;padding:24px 18px}
.gender-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:24px 0}
.gender-card{background:var(--sf);border:2px solid var(--bd2);padding:28px 16px;text-align:center;cursor:pointer;box-shadow:4px 4px 0 #000}
.gender-card.selected{border-color:var(--ap);background:rgba(255,45,85,.08)}
.modal-action-btn{width:100%;padding:18px;background:var(--ap);color:#fff;border:2px solid #000;font-family:'Bebas Neue',sans-serif;font-size:20px;cursor:pointer;box-shadow:4px 4px 0 #000}
.modal-action-btn:disabled{opacity:.3;cursor:not-allowed}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--tx);color:var(--bg);padding:12px 22px;z-index:600;opacity:0;transition:.25s;border:2px solid #000;box-shadow:4px 4px 0 #000}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">SP<span class="x">✕</span>LL</div>
    <span class="online-pill" id="onlineCount">21 ONLINE</span>
  </div>
  <div class="scroll">
    <div class="radar-sect">
      <div class="radar-label">VIBE RADAR</div>
      <div class="radar-cont">
        <div class="radar-grid"></div><div class="radar-ring"></div><div class="radar-cross"></div>
        <canvas class="radar-canvas" id="radarCanvas" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
      </div>
    </div>
    <button class="btn-vibe-check" onclick="startVibeCheck()"><span>VIBE CHECK</span></button>
    <button class="btn-whisper" onclick="toast('Whisperer (premium)')">WHISPERER ✦</button>
    
    <div class="filter-sect">
      <div class="filter-title">KESELARASAN <span class="match-pct" id="vibePct">87%</span></div>
      <div class="mood-scroll" id="moodFilter">
        <button class="mood-chip active" data-mood="all">SEMUA</button>
        <button class="mood-chip" data-mood="surviving">😮‍💨 SURVIVING</button>
        <button class="mood-chip" data-mood="thriving">✨ THRIVING</button>
        <button class="mood-chip" data-mood="chaotic">🌀 CHAOTIC</button>
        <button class="mood-chip" data-mood="doom">🛌 DOOM</button>
      </div>
    </div>
    
    <div class="spills-sect">
      <div class="sect-title">SPILL TERKINI</div>
      <div id="spillsList"></div>
      <button class="refresh-btn" onclick="refreshSpills()">↻ SEDUH TEH BARU</button>
    </div>
  </div>
  
  <nav class="bottom-nav">
    <div class="nav-container">
      <a href="#" class="nav-item active"><span>✕</span><span>SPILL</span></a>
      <a href="#" class="nav-item"><span>✦</span><span>JEJAK</span></a>
      <a href="#" class="nav-item"><span>⚡</span><span>GLITCH</span></a>
      <a href="#" class="nav-item"><span>〜</span><span>COCOMEO</span></a>
    </div>
  </nav>
</div>

<!-- MODAL GENDER -->
<div class="modal" id="genderModal">
  <div class="modal-header"><div class="modal-title">PILIH GENDER</div><button class="modal-close" onclick="closeModal('genderModal')">✕</button></div>
  <div class="modal-body">
    <div class="gender-grid">
      <div class="gender-card" onclick="selectGender(this,'female')"><span>♀️</span><span>CEWEK</span></div>
      <div class="gender-card" onclick="selectGender(this,'male')"><span>♂️</span><span>COWOK</span></div>
    </div>
    <button class="modal-action-btn" id="confirmGenderBtn" onclick="confirmGender()" disabled>GASKEUN →</button>
  </div>
</div>

<!-- CHAT ROOM -->
<div class="chat-room" id="chatRoom">
  <div class="chat-head">
    <span id="partnerLabel">MENCARI...</span>
    <div class="chat-timer" id="chatTimer">15:00</div>
    <button class="modal-close" onclick="closeChat()">✕</button>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-wrap">
    <input type="text" class="chat-input" id="chatInput" placeholder="ketik sesuatu..." maxlength="200">
    <button class="chat-send" id="sendButton" onclick="sendMsg()">➤</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared-constants.js"></script>
<script>
// ==================== KONFIGURASI ====================
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));
const rnd = n => Math.floor(Math.random() * n);
const API_URL = 'https://jejak.space/api/chat';

if (!JEJAK.isLoggedIn()) window.location.replace('/index.html');

let sbClient = null, myUserId = null, myUsername = null, realEntries = [], fillerEntries = [];
let currentGender = null, chatPartner = null, timerInterval = null, chatTimeLeft = 900;
let chatHistory = [], isTyping = false, fallbackTimer = null, apiRetry = 0, activeMood = 'all';
let userSub = { isActive: false };

const AI_CHARS = {
  female: ['beby.manis', 'strawberry.shortcake', 'pretty.sad', 'little.fairy'],
  male: ['sejuta.badai', 'kue.bulan', 'agak.koplak', 'chili.padi']
};
const REACT_EMO = { skull: '💀', cry: '😭', fire: '🔥', upside: '🙃' };
const SPILLS = [
  'hari ini gue liat mantan sama cewek baru 😭',
  'cape bener jadi cewek, tiap bulan sakit perut',
  'kenapa cowok kalo ditanya "lagi apa" pasti jawab "lagi main"?',
  'gue lagi fase pengen dimengerti tanpa jelasin panjang lebar',
  'bete banget skincare gue habis, padahal baru beli kemarin',
  'stress skripsi tapi yang keluar peluh dan air mata doang'
];
const MOODS = ['surviving', 'thriving', 'chaotic', 'doom'];

// ==================== AI PINTAR (DETEKSI KONTEKS) ====================
function getOfflineReply(msg) {
  msg = (msg || '').toLowerCase().trim();
  
  if (msg.includes('lagi apa') || msg.includes('lagi mana') || 
      msg.includes('lagi ngapain') || msg === 'lagi' ||
      msg.includes('lagi dimana')) {
    const aktivitas = [
      'lagi santai dengerin musik nih',
      'lagi ngopi sambil scroll timeline',
      'lagi rebahan sambil mikir random',
      'lagi dengerin playlist galau',
      'lagi baca chat lo, hehe',
      'lagi gabut, lo?'
    ];
    return aktivitas[rnd(aktivitas.length)];
  }
  
  if (msg.includes('kabar') || (msg.includes('gimana') && msg.includes('kabar'))) {
    return 'baik-baik aja nih, lo gimana?';
  }
  
  if (msg.includes('sibuk') || (msg.includes('lagi') && msg.includes('ngapain'))) {
    return 'lagi santai aja, nggak sibuk kok. lo?';
  }
  
  if (msg.includes('lo gimana') || msg === 'lo?' || msg === 'kamu?') {
    return 'gue? biasa aja sih. lo yang cerita dong';
  }
  
  if (msg.includes('menurut lo') || msg.includes('versi lo') || msg.includes('kata lo')) {
    return 'hmm menurut gue pribadi sih... tergantung situasinya ya';
  }
  
  if (msg.includes('?') || msg.endsWith('?')) {
    if (!msg.includes('lagi')) {
      return 'hmm, gue juga masih mikirin itu. lo sendiri gimana?';
    }
  }
  
  if (msg.length > 40) {
    return 'wah, gue ngerti perasaan lo. cerita lebih lanjut dong';
  }
  
  if (msg.includes('halo') || msg.includes('hai') || msg.includes('hey')) {
    return 'hai juga! lagi ngapain?';
  }
  
  if (msg.includes('iya') || msg.includes('setuju') || msg.includes('bener')) {
    return 'nah iyaa, kita sepakat berarti 😄';
  }
  
  if (msg === 'terus' || msg === 'terus?' || msg.includes('lalu')) {
    return 'terus gue dengerin cerita lo';
  }
  
  if (msg.length < 10) {
    const gaJelas = [
      'hmm maksudnya?',
      'lo nanya apa? gue kurang paham',
      'eh? gimana?',
      'maaf, gue kurang ngerti. bisa dijelasin lagi?'
    ];
    return gaJelas[rnd(gaJelas.length)];
  }
  
  const defaultResp = [
    'hehe iya, gue juga ngerasain',
    'wah serius? cerita dong',
    'relate banget sih',
    'iya ya, hidup emang gitu',
    'gue ngerti banget perasaan lo'
  ];
  return defaultResp[rnd(defaultResp.length)];
}

// ==================== TYPING EFFECT (SLOW) ====================
async function typeMessage(element, finalText) {
  return new Promise(resolve => {
    let i = 0, chars = finalText.split('');
    const next = () => {
      if (i >= chars.length) return resolve();
      element.textContent += chars[i++];
      let delay = 60 + Math.random() * 60;
      if (chars[i-1].match(/[.!?]/)) delay = 300 + Math.random() * 200;
      else if (chars[i-1].match(/[,;]/)) delay = 180 + Math.random() * 120;
      else if (chars[i-1] === ' ') delay = 120 + Math.random() * 80;
      setTimeout(next, delay);
    };
    element.textContent = '';
    next();
  });
}

// ==================== UTILITY ====================
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
const closeModal = id => $(id).classList.remove('on');
const updateVibePct = v => $('vibePct').textContent = v + '%';
const checkSub = () => userSub.isActive;

function initSupabase() {
  try {
    sbClient = supabase.createClient(JEJAK.SUPABASE_URL, JEJAK.SUPABASE_KEY);
    const sess = JEJAK.getSession();
    myUserId = sess.uid;
    myUsername = sess.username;
    const sub = JEJAK.getSub();
    if (sub) userSub = sub;
  } catch (e) { console.warn(e); }
}

// ==================== SPILLS ====================
function genSpills(n = 6) {
  let out = [];
  for (let i = 0; i < n; i++) {
    out.push({
      id: 'gen_' + Date.now() + '_' + i,
      author: 'anon.' + Math.random().toString(36).substring(7),
      mood: MOODS[rnd(4)],
      content: SPILLS[rnd(SPILLS.length)],
      reactions: { skull: rnd(30), cry: rnd(30), fire: rnd(30), upside: rnd(30) },
      userReacted: null
    });
  }
  return out;
}

function renderSpills() {
  const list = $('spillsList');
  if (!list) return;
  let all = [...realEntries, ...fillerEntries.slice(0, Math.max(0, 6 - realEntries.length))];
  let filtered = activeMood === 'all' ? all : all.filter(s => s.mood === activeMood);
  
  list.innerHTML = filtered.map(s => `
    <div class="spill-card ${s.userId === myUserId ? 'is-mine' : ''}">
      <div class="spill-head">
        <span class="spill-user ${s.userId === myUserId ? 'mine' : ''}">@${s.author}</span>
        <span class="spill-mood ${s.mood}">${s.mood.toUpperCase()}</span>
      </div>
      <div class="spill-body">${s.content}</div>
      <div class="spill-actions">
        ${Object.entries(REACT_EMO).map(([k, em]) => `
          <button class="react-btn ${s.userReacted === k ? 'active' : ''}" 
                  onclick="react('${s.id}','${k}')">${em} ${s.reactions[k] || 0}</button>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function react(id, key) {
  let entry = [...realEntries, ...fillerEntries].find(e => e.id === id);
  if (!entry) return;
  if (entry.userReacted === key) {
    entry.reactions[key]--;
    entry.userReacted = null;
  } else {
    if (entry.userReacted) entry.reactions[entry.userReacted]--;
    entry.reactions[key] = (entry.reactions[key] || 0) + 1;
    entry.userReacted = key;
  }
  renderSpills();
}

async function refreshSpills() {
  toast('Memuat spill terbaru...');
  fillerEntries = genSpills(6);
  renderSpills();
}

// ==================== VIBE CHECK ====================
function startVibeCheck() {
  chatPartner = null; chatTimeLeft = 900; chatHistory = []; apiRetry = 0;
  if (fallbackTimer) clearTimeout(fallbackTimer);
  $('genderModal').classList.add('on');
}

function selectGender(el, g) {
  document.querySelectorAll('.gender-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  currentGender = g;
  $('confirmGenderBtn').disabled = false;
}

function updateSysMsg(text, emoji) {
  const msgs = $('chatMessages');
  const last = msgs.lastElementChild;
  if (last && last.classList.contains('system-msg')) last.remove();
  
  const d = document.createElement('div');
  d.className = 'chat-msg system-msg';
  d.innerHTML = `<div class="chat-bubble" style="background:var(--sfe);padding:10px 16px">${emoji} ${text}</div>`;
  msgs.appendChild(d);
  d.scrollIntoView({ behavior: 'smooth' });
}

function confirmGender() {
  if (!currentGender) return;
  closeModal('genderModal');
  $('chatRoom').classList.add('on');
  $('partnerLabel').textContent = 'MENCARI...';
  $('chatTimer').textContent = '15:00';
  $('chatTimer').classList.remove('warn');
  
  const msgs = $('chatMessages');
  msgs.innerHTML = `<div class="chat-msg system-msg" style="align-self:center">⚡ mengaktifkan radar pencarian...</div>`;
  
  // TIMER 15 DETIK REAL USER
  let detik = 0;
  const cariUser = setInterval(() => {
    detik += 3;
    if (detik === 3) updateSysMsg("masih memindai...", "👀");
    if (detik === 6) updateSysMsg("lingkungan sepi, radar melebar", "📡");
    if (detik === 9) updateSysMsg("menjangkau radius 2km", "🌐");
    if (detik === 12) updateSysMsg("hampir selesai...", "⏳");
  }, 3000);
  
  // FALLBACK KE AI KARAKTER
  fallbackTimer = setTimeout(() => {
    clearInterval(cariUser);
    if (!chatPartner) {
      msgs.innerHTML = '';
      const chars = AI_CHARS[currentGender];
      chatPartner = { name: chars[rnd(chars.length)], isAI: true };
      $('partnerLabel').textContent = '@' + chatPartner.name;
      
      const d = document.createElement('div');
      d.className = 'chat-msg system-msg';
      d.innerHTML = '<div class="chat-bubble" style="background:rgba(0,229,255,.08);border:2px solid var(--as)">👤 seseorang ditemukan!</div>';
      msgs.appendChild(d);
      
      setTimeout(() => {
        msgs.innerHTML = '';
        callChatAPI('', true);
        startTimer();
      }, 1000);
    }
  }, 15000);
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (--chatTimeLeft < 0) return closeChat();
    const m = Math.floor(chatTimeLeft / 60);
    const s = chatTimeLeft % 60;
    $('chatTimer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
    if (chatTimeLeft === 60) $('chatTimer').classList.add('warn');
  }, 1000);
}

// ==================== CHAT API ====================
async function callChatAPI(userMsg, isFirst) {
  if (!chatPartner || !chatPartner.isAI || isTyping) return;
  
  isTyping = true;
  const sb = $('sendButton');
  const inp = $('chatInput');
  if (sb) sb.classList.add('disabled');
  if (inp) inp.disabled = true;
  
  const msgs = $('chatMessages');
  const td = document.createElement('div');
  td.className = 'chat-msg other';
  td.innerHTML = '<div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  msgs.appendChild(td);
  td.scrollIntoView({ behavior: 'smooth' });
  
  let reply = null;
  
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: isFirst ? 'halo' : userMsg,
        characterName: chatPartner.name,
        userName: myUsername || 'user',
        lastMessages: chatHistory.slice(-4).map(m => m.content).join('\n')
      })
    });
    if (res.ok) {
      const data = await res.json();
      reply = data.reply;
    }
  } catch (e) { console.warn('API error:', e); }
  
  if (!reply) {
    if (isFirst) {
      const firstName = chatPartner.name.split('.')[0];
      const greetings = [
        `halo! gue ${firstName}. seneng bisa ngobrol sama lo 😊`,
        `hai hai, gue ${firstName}. lagi ngapain?`,
        `eh halo, akhirnya ada yang nyapa 😄 gue ${firstName}`
      ];
      reply = greetings[rnd(greetings.length)];
    } else {
      reply = getOfflineReply(userMsg);
    }
    if (++apiRetry >= 2) toast('⚡ mode offline');
  }
  
  td.remove();
  await sleep(400 + Math.random() * 500);
  
  const msgDiv = document.createElement('div');
  msgDiv.className = 'chat-msg other';
  const bubble = document.createElement('div');
  bubble.className = 'chat-bubble';
  msgDiv.appendChild(bubble);
  msgs.appendChild(msgDiv);
  
  await typeMessage(bubble, reply);
  
  if (!isFirst) chatHistory.push({ role: 'user', content: userMsg });
  chatHistory.push({ role: 'assistant', content: reply });
  
  isTyping = false;
  if (sb) sb.classList.remove('disabled');
  if (inp) inp.disabled = false;
  if (inp) inp.focus();
}

function sendMsg() {
  if (isTyping || !chatPartner) return;
  
  const inp = $('chatInput');
  const text = inp.value.trim();
  if (!text) return;
  
  const msgs = $('chatMessages');
  const d = document.createElement('div');
  d.className = 'chat-msg own';
  d.innerHTML = `<div class="chat-bubble">${text}</div>`;
  msgs.appendChild(d);
  d.scrollIntoView({ behavior: 'smooth' });
  inp.value = '';
  
  chatHistory.push({ role: 'user', content: text });
  if (chatPartner.isAI) callChatAPI(text, false);
}

function closeChat() {
  $('chatRoom').classList.remove('on');
  clearInterval(timerInterval);
  clearTimeout(fallbackTimer);
  isTyping = false;
}

// ==================== RADAR ====================
let radarRAF = null, needleA = 0, needleO = 0;
let phA = Math.random() * Math.PI * 2;
const BASE_OM = (60/4 * Math.PI * 2) / (60 * 60);

function initRadar() {
  const cv = $('radarCanvas');
  const ct = cv.parentElement;
  if (!cv || !ct) return;
  
  const resize = () => {
    const r = ct.getBoundingClientRect();
    cv.width = r.width;
    cv.height = r.height;
  };
  resize();
  window.addEventListener('resize', resize);
  
  function draw() {
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height;
    const cx = W/2, cy = H/2, R = Math.min(cx, cy) * 0.88;
    
    phA += 0.007;
    needleO += (BASE_OM * (1 + Math.sin(phA) * 0.35) - needleO) * 0.028;
    needleA = (needleA + needleO) % (Math.PI * 2);
    
    ctx.fillStyle = 'rgba(2,10,2,0.18)';
    ctx.fillRect(0, 0, W, H);
    
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(needleA);
    ctx.shadowColor = 'rgba(0,229,255,0.95)';
    ctx.shadowBlur = 12;
    
    const lg = ctx.createLinearGradient(0, 0, R, 0);
    lg.addColorStop(0, 'rgba(0,229,255,1)');
    lg.addColorStop(0.8, 'rgba(0,229,255,0.4)');
    lg.addColorStop(1, 'rgba(0,229,255,0)');
    
    ctx.beginPath();
    ctx.moveTo(3, 0);
    ctx.lineTo(R, 0);
    ctx.strokeStyle = lg;
    ctx.lineWidth = 2;
    ctx.stroke();
    
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.rect(-4, -4, 8, 8);
    ctx.fillStyle = '#00e5ff';
    ctx.fill();
    ctx.restore();
    
    radarRAF = requestAnimationFrame(draw);
  }
  radarRAF = requestAnimationFrame(draw);
}

// ==================== INIT ====================
document.addEventListener('DOMContentLoaded', () => {
  initSupabase();
  initRadar();
  refreshSpills();
  
  document.querySelectorAll('.mood-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mood-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeMood = btn.dataset.mood;
      renderSpills();
    });
  });
  
  $('chatInput')?.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMsg();
    }
  });
  
  setInterval(() => {
    $('onlineCount').textContent = (Math.floor(Math.random() * 25) + 18) + ' ONLINE';
  }, 30000);
});
