<!DOCTYPE html>
<html lang="id" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>SPILL — vibe radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--sf:#0f0f0f;--sfe:#141414;--bd:#222;--bd2:#2e2e2e;--tx:#f0ece6;--txs:#777;--txm:#444;--ap:#ff2d55;--as:#00e5ff;--aq:#bfff00;--gold:#ffd60a;--purple:#bf5af2;--ms:#ff9f0a;--mt:#bfff00;--mc:#00e5ff;--md:#bf5af2;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:Syne,-apple-system,sans-serif;font-size:14px;line-height:1.4;position:fixed;width:100%;overscroll-behavior:none}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.028;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E") 0 0/200px 200px}
.app{height:100%;display:flex;flex-direction:column;overflow:hidden}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;padding-top:calc(14px + var(--st));border-bottom:2px solid var(--bd);background:var(--bg);flex-shrink:0;position:relative}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--ap),var(--as),var(--aq))}
.logo{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;line-height:1}
.logo .x{color:var(--ap);display:inline-block;animation:spin-x 4s ease-in-out infinite}
@keyframes spin-x{0%,90%,100%{transform:rotate(0) scale(1)}95%{transform:rotate(180deg) scale(1.2)}}
.user-menu{display:flex;align-items:center;gap:8px;position:relative}
.user-badge{font-family:'DM Mono',monospace;font-size:12px;color:var(--as);border:2px solid var(--bd);padding:4px 8px;background:#000;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:opacity .2s}
.user-badge:hover{opacity:.8}
.settings-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--sf);border:2px solid var(--bd2);color:var(--txs);font-size:20px;font-weight:bold;cursor:pointer;box-shadow:3px 3px 0 #000;transition:all .08s;line-height:1;transform:rotate(90deg)}
.settings-icon:active{transform:translate(2px,2px) rotate(90deg);box-shadow:1px 1px 0 #000}
.settings-menu{display:none;position:absolute;top:100%;right:0;margin-top:8px;background:var(--sf);border:2px solid var(--bd2);box-shadow:4px 4px 0 #000;z-index:1000;min-width:120px}
.settings-menu.show{display:block}
.settings-item{padding:10px 16px;font-family:'DM Mono',monospace;font-size:11px;color:var(--tx);cursor:pointer;border-bottom:1px solid var(--bd);transition:all .1s}
.settings-item:last-child{border-bottom:none}
.settings-item:hover{background:var(--ap);color:#fff}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding-bottom:62px}
.scroll::-webkit-scrollbar{display:none}
.chat-room{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column}
.chat-room.on{display:flex}
.chat-head{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;padding-top:calc(12px + var(--st));border-bottom:2px solid var(--bd);background:var(--sf);flex-shrink:0}
.chat-info{flex:1;display:flex;align-items:center;gap:10px}
.partner-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--txs);letter-spacing:1px}
.chat-timer{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--aq);background:var(--bg);padding:8px 14px;border:2px solid var(--bd);box-shadow:3px 3px 0 #000}
.chat-close{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--bg);border:2px solid var(--bd);color:var(--txs);margin-left:12px;font-size:18px;cursor:pointer;box-shadow:3px 3px 0 #000;transition:all .08s}
.chat-close:active{transform:translate(2px,2px);box-shadow:none}
.chat-status-bar{display:none;padding:6px 18px;background:rgba(255,45,85,.12);border-bottom:1px solid rgba(255,45,85,.3);font-family:'DM Mono',monospace;font-size:10px;color:var(--ap);letter-spacing:1px;text-align:center;flex-shrink:0}
.chat-status-bar.show{display:block}
.chat-status-bar.info{background:rgba(0,229,255,.08);border-bottom-color:rgba(0,229,255,.2);color:var(--as)}
.chat-messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.chat-msg{display:flex;flex-direction:column;max-width:85%}
.chat-msg.own{align-self:flex-end}
.chat-msg.other{align-self:flex-start}
.chat-msg.system-msg{align-self:center!important;max-width:90%!important}
.chat-bubble{padding:12px 16px;font-size:15px;line-height:1.55;word-wrap:break-word;border:2px solid}
.own .chat-bubble{background:var(--ap);color:#fff;border-color:#000;box-shadow:3px 3px 0 #000;font-weight:600}
.other .chat-bubble{background:var(--sf);border-color:var(--bd2);box-shadow:3px 3px 0 rgba(0,0,0,.5)}
.system-msg .chat-bubble{background:transparent;border:2px dashed var(--bd);color:var(--txs);font-style:italic;text-align:center}
.typing{display:flex;gap:5px;padding:14px 18px;background:var(--sf);border:2px solid var(--bd2);align-self:flex-start;width:fit-content;box-shadow:3px 3px 0 rgba(0,0,0,.5)}
.typing-dot{width:7px;height:7px;background:var(--as);transform:rotate(45deg);animation:typi 1.4s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typi{0%,60%,100%{transform:rotate(45deg) translateY(0)}30%{transform:rotate(45deg) translateY(-5px)}}
.chat-input-wrap{padding:12px 18px;padding-bottom:calc(12px + var(--sb));border-top:2px solid var(--bd);background:var(--sf);display:flex;gap:10px;align-items:center;flex-shrink:0}
.chat-input{flex:1;background:var(--bg);border:2px solid var(--bd2);padding:13px 16px;font-size:15px;color:var(--tx);outline:none;-webkit-appearance:none;transition:border-color .15s;font-family:Syne,sans-serif}
.chat-input:focus{border-color:var(--ap)}
.chat-input:disabled{opacity:.4;cursor:not-allowed}
.chat-send{width:48px;height:48px;background:var(--ap);border:2px solid #000;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;flex-shrink:0;cursor:pointer;box-shadow:3px 3px 0 #000;transition:all .08s}
.chat-send:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000}
.chat-send.disabled{opacity:.3;pointer-events:none}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--tx);color:var(--bg);padding:12px 22px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.5px;z-index:600;opacity:0;transition:all .25s cubic-bezier(.175,.885,.32,1.275);pointer-events:none;white-space:nowrap;border:2px solid #000;box-shadow:4px 4px 0 #000}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--ap);color:#fff}
.modal{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;overflow:hidden}
.modal.on{display:flex}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:2px solid var(--bd)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
.modal-close{width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:var(--sf);border:2px solid var(--bd2);color:var(--txs);font-size:16px;cursor:pointer;box-shadow:3px 3px 0 #000}
.modal-body{flex:1;overflow-y:auto;padding:24px 18px}
.gender-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}
.gender-card{background:var(--sf);border:2px solid var(--bd2);padding:28px 16px;text-align:center;cursor:pointer;box-shadow:4px 4px 0 #000}
.gender-card.selected{border-color:var(--ap);background:rgba(255,45,85,.08)}
.gender-icon{font-size:36px;margin-bottom:12px;display:block}
.gender-label{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px}
.modal-action-btn{width:100%;padding:18px;background:var(--ap);color:#fff;border:2px solid #000;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;cursor:pointer;box-shadow:4px 4px 0 #000;margin-top:20px}
.modal-action-btn:disabled{opacity:.3;cursor:not-allowed}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">SP<span class="x">✕</span>LL</div>
    <div class="user-menu">
      <span class="user-badge" id="userBadge">@user</span>
      <div class="settings-icon" id="settingsIcon">⋮</div>
    </div>
  </div>
  <div class="scroll" id="scroll">
    <div style="padding:40px 20px;text-align:center">
      <h1 style="font-family:'Bebas Neue';font-size:48px;margin-bottom:20px">VIBE CHECK</h1>
      <button onclick="startChat()" style="padding:20px 40px;background:var(--ap);color:#fff;border:2px solid #000;font-family:'Bebas Neue';font-size:24px;cursor:pointer;box-shadow:5px 5px 0 #000">START CHAT</button>
    </div>
  </div>
</div>

<div class="modal" id="genderModal">
  <div class="modal-header">
    <div class="modal-title">PILIH GENDER</div>
    <button class="modal-close" onclick="closeModal('genderModal')">✕</button>
  </div>
  <div class="modal-body">
    <div class="gender-grid">
      <div class="gender-card" onclick="selectGender('female')">
        <span class="gender-icon">♀️</span>
        <span class="gender-label">CEWEK</span>
      </div>
      <div class="gender-card" onclick="selectGender('male')">
        <span class="gender-icon">♂️</span>
        <span class="gender-label">COWOK</span>
      </div>
    </div>
    <button class="modal-action-btn" id="confirmBtn" disabled onclick="confirmGender()">GASKEUN →</button>
  </div>
</div>

<div class="chat-room" id="chatRoom">
  <div class="chat-head">
    <div class="chat-info">
      <span class="partner-label" id="partnerLabel">MENCARI...</span>
    </div>
    <div class="chat-timer" id="timer">15:00</div>
    <button class="chat-close" onclick="closeChat()">✕</button>
  </div>
  <div class="chat-status-bar" id="statusBar"></div>
  <div class="chat-messages" id="messages"></div>
  <div class="chat-input-wrap">
    <input type="text" class="chat-input" id="input" placeholder="ketik sesuatu..." maxlength="200">
    <button class="chat-send" id="sendBtn" onclick="sendMsg()">➤</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ============================================
// CRITICAL FIX: USE SAME-ORIGIN API FIRST!
// ============================================
const API_URL = '/api/chat';  // ✅ BENAR - Same originA

const AI_CHARS = {
  female: ['beby.manis', 'strawberry.shortcake', 'pretty.sad', 'little.fairy', 'cinnamon.girl'],
  male: ['sejuta.badai', 'satria.bajahitam', 'agak.koplak', 'chili.padi', 'bang.juned']
};

let currentGender = null;
let chatPartner = null;
let chatHistory = [];
let isTyping = false;

const $ = id => document.getElementById(id);
const rnd = arr => arr[Math.floor(Math.random() * arr.length)];
const sleep = ms => new Promise(r => setTimeout(r, ms));

function toast(msg, err = false) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast' + (err ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function closeModal(id) {
  $(id).classList.remove('on');
}

function setChatStatus(msg, type = 'error') {
  const bar = $('statusBar');
  if (!msg) {
    bar.classList.remove('show', 'info');
    return;
  }
  bar.textContent = msg;
  bar.className = 'chat-status-bar show' + (type === 'info' ? ' info' : '');
}

function startChat() {
  $('genderModal').classList.add('on');
}

function selectGender(g) {
  document.querySelectorAll('.gender-card').forEach(c => c.classList.remove('selected'));
  event.target.closest('.gender-card').classList.add('selected');
  currentGender = g;
  $('confirmBtn').disabled = false;
}

function confirmGender() {
  if (!currentGender) return;
  closeModal('genderModal');
  
  const chars = AI_CHARS[currentGender];
  chatPartner = { name: rnd(chars), isAI: true };
  chatHistory = [];
  
  $('chatRoom').classList.add('on');
  $('messages').innerHTML = '';
  $('partnerLabel').textContent = chatPartner.name.split('.')[0];
  
  setChatStatus('');
  
  // Send first message
  callChatAPI('', true);
}

function closeChat() {
  $('chatRoom').classList.remove('on');
  chatPartner = null;
  chatHistory = [];
  isTyping = false;
}

function addMsg(text, isOwn = false, isSystem = false) {
  const msgs = $('messages');
  const div = document.createElement('div');
  div.className = 'chat-msg' + (isOwn ? ' own' : isSystem ? ' system-msg' : ' other');
  div.innerHTML = `<div class="chat-bubble">${text}</div>`;
  msgs.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

async function typeMessage(el, text) {
  return new Promise(resolve => {
    let i = 0;
    const chars = text.split('');
    el.textContent = '';
    const next = () => {
      if (i >= chars.length) return resolve();
      el.textContent += chars[i];
      i++;
      setTimeout(next, 20 + Math.random() * 20);
    };
    next();
  });
}

async function callChatAPI(userMsg, isFirst = false) {
  if (!chatPartner?.isAI) return;
  if (isTyping && !isFirst) {
    toast('Tunggu partner selesai ngetik...', true);
    return;
  }

  isTyping = true;
  const sb = $('sendBtn');
  const inp = $('input');
  if (sb) sb.classList.add('disabled');
  if (inp) inp.disabled = true;

  const msgs = $('messages');
  const td = document.createElement('div');
  td.className = 'chat-msg other';
  td.innerHTML = '<div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  msgs.appendChild(td);
  td.scrollIntoView({ behavior: 'smooth' });

  const historyForAPI = isFirst ? [] : chatHistory.slice(-6).map(m => ({ role: m.role, content: m.content }));
  
  let reply = null;

  try {
    console.log('[API] Calling:', API_URL);
    
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 10000);

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: isFirst ? 'halo' : userMsg,
        characterName: chatPartner.name,
        userName: 'user',
        lastMessages: historyForAPI
      }),
      signal: ctrl.signal
    });

    clearTimeout(tid);

    if (res.ok) {
      const data = await res.json();
      reply = data.reply;
      console.log('[API] Success:', data.mode);
      if (data.mode === 'offline') {
        setChatStatus('⚡ mode offline aktif', 'info');
        setTimeout(() => setChatStatus(''), 3000);
      }
    } else {
      console.error('[API] Error:', res.status);
    }
  } catch (e) {
    console.error('[API] Failed:', e.message);
    setChatStatus('⚠️ Koneksi bermasalah, coba lagi', 'error');
  }

  if (td?.parentNode) td.remove();

  if (!reply) {
    // Offline fallback
    const responses = ['hmm, cerita dong', 'iya? lanjutin', 'oh gitu, terus gimana?'];
    reply = rnd(responses);
  }

  await sleep(300 + Math.random() * 400);

  const msgDiv = document.createElement('div');
  msgDiv.className = 'chat-msg other';
  const bubble = document.createElement('div');
  bubble.className = 'chat-bubble';
  msgDiv.appendChild(bubble);
  msgs.appendChild(msgDiv);

  await typeMessage(bubble, reply);

  chatHistory.push({ role: 'assistant', content: reply });

  isTyping = false;
  if (sb) sb.classList.remove('disabled');
  if (inp) {
    inp.disabled = false;
    setTimeout(() => inp.focus(), 100);
  }
}

function sendMsg() {
  if (isTyping) {
    toast('Tunggu partner selesai ngetik...', true);
    return;
  }
  if (!chatPartner) {
    toast('Partner belum ditemukan', true);
    return;
  }
  
  const inp = $('input');
  const text = inp.value.trim();
  if (!text) return;

  addMsg(text, true);
  inp.value = '';

  chatHistory.push({ role: 'user', content: text });
  
  if (chatPartner.isAI) {
    callChatAPI(text, false);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  $('input')?.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMsg();
    }
  });
});
</script>
</body>
</html>
