<!DOCTYPE html>
<html lang="id" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>SPILL — vibe radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================
   RESET & VARIABLES
   ============================================ */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

:root {
    --bg: #080808;
    --sf: #0f0f0f;
    --sfe: #141414;
    --bd: #222;
    --bd2: #2e2e2e;
    --tx: #f0ece6;
    --txs: #777;
    --ap: #ff2d55;
    --as: #00e5ff;
    --aq: #bfff00;
    --purple: #bf5af2;
    --heart: #ff2d55;
    --spade: #00e5ff;
    --ms: #ff9f0a;
    --mt: #bfff00;
    --mc: #00e5ff;
    --md: #bf5af2;
    --sb: env(safe-area-inset-bottom, 0px);
    --st: env(safe-area-inset-top, 0px);
}

html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--tx);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
}

body {
    position: fixed;
    width: 100%;
    height: 100%;
}

.app {
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ============================================
   HEADER
   ============================================ */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    padding-top: calc(14px + var(--st));
    border-bottom: 2px solid var(--bd);
    background: var(--bg);
    flex-shrink: 0;
    position: relative;
}

.header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--ap), var(--as), var(--aq));
}

.logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    letter-spacing: 2px;
}

.logo .x {
    color: var(--ap);
    display: inline-block;
    animation: spin-x 4s ease-in-out infinite;
}

@keyframes spin-x {
    0%,90%,100% { transform: rotate(0); }
    95% { transform: rotate(180deg); }
}

.user-menu {
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
}

.user-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--as);
    border: 2px solid var(--bd);
    padding: 4px 8px;
    background: #000;
    cursor: pointer;
}

.settings-icon {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--sf);
    border: 2px solid var(--bd2);
    color: var(--txs);
    font-size: 20px;
    cursor: pointer;
    transform: rotate(90deg);
    box-shadow: 3px 3px 0 #000;
}

.settings-icon:active {
    transform: translate(2px, 2px) rotate(90deg);
    box-shadow: 1px 1px 0 #000;
}

.settings-menu {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    background: var(--sf);
    border: 2px solid var(--bd2);
    z-index: 1000;
    min-width: 120px;
}

.settings-menu.show { display: block; }

.settings-item {
    padding: 10px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--tx);
    cursor: pointer;
    border-bottom: 1px solid var(--bd);
}

.settings-item:hover { background: var(--ap); color: #fff; }

/* ============================================
   SCROLL AREA
   ============================================ */
.scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 62px;
}

.scroll::-webkit-scrollbar { display: none; }

/* ============================================
   RADAR SECTION
   ============================================ */
.radar-sect {
    background: var(--sf);
    border-bottom: 2px solid var(--bd);
}

.radar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px 12px;
}

.radar-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--as);
    letter-spacing: 3px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.radar-label-dot {
    width: 8px;
    height: 8px;
    background: var(--as);
    transform: rotate(45deg);
    animation: blink-sq 1.2s step-end infinite;
}

@keyframes blink-sq {
    0%,100% { opacity: 1; }
    50% { opacity: 0.2; }
}

.online-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,229,255,0.1);
    padding: 6px 12px;
    border: 1px solid var(--bd);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
}

.online-dot {
    width: 8px;
    height: 8px;
    background: var(--aq);
    transform: rotate(45deg);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%,100% { transform: rotate(45deg) scale(1); }
    50% { transform: rotate(45deg) scale(1.2); }
}

.radar-wrapper { padding: 0 18px 16px; }

.radar-bezel {
    position: relative;
    padding: 4px;
    background: var(--bg);
    border: 2px solid var(--bd2);
    box-shadow: 6px 6px 0 #000;
}

.radar-bezel::before {
    content: '';
    position: absolute;
    top: -1px;
    left: -1px;
    width: 20px;
    height: 20px;
    border-top: 3px solid var(--as);
    border-left: 3px solid var(--as);
    z-index: 5;
}

.radar-bezel::after {
    content: '';
    position: absolute;
    bottom: -1px;
    right: -1px;
    width: 20px;
    height: 20px;
    border-bottom: 3px solid var(--ap);
    border-right: 3px solid var(--ap);
    z-index: 5;
}

.corner-tr {
    position: absolute;
    top: -1px;
    right: -1px;
    width: 20px;
    height: 20px;
    border-top: 3px solid var(--aq);
    border-right: 3px solid var(--aq);
    z-index: 5;
}

.corner-bl {
    position: absolute;
    bottom: -1px;
    left: -1px;
    width: 20px;
    height: 20px;
    border-bottom: 3px solid var(--gold);
    border-left: 3px solid var(--gold);
    z-index: 5;
}

.radar-bezel-label {
    position: absolute;
    top: -12px;
    left: 30px;
    background: var(--bg);
    padding: 0 8px;
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--txm);
    z-index: 6;
}

.radar-bezel-range {
    position: absolute;
    bottom: -10px;
    right: 30px;
    background: var(--bg);
    padding: 0 8px;
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--txm);
    z-index: 6;
}

/* RADAR CONTAINER */
.radar-cont {
    position: relative;
    width: 100%;
    aspect-ratio: 1/1;
    background: #020a02;
    overflow: hidden;
}

/* Grid background */
.radar-grid {
    position: absolute;
    inset: 0;
    background-image: 
        repeating-linear-gradient(0deg, rgba(0,229,255,.04) 0px, transparent 1px, transparent 28px),
        repeating-linear-gradient(90deg, rgba(0,229,255,.04) 0px, transparent 1px, transparent 28px);
}

/* Rings */
.radar-ring {
    position: absolute;
    inset: 8%;
    border: 1px solid rgba(0,229,255,.08);
    border-radius: 50%;
}

.radar-ring::before {
    content: '';
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(0,229,255,.05);
    inset: 28%;
}

.radar-ring::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(0,229,255,.03);
    inset: 54%;
}

/* Cross lines */
.radar-cross {
    position: absolute;
    inset: 0;
    background: 
        linear-gradient(90deg, transparent calc(50% - .5px), rgba(0,229,255,.06) calc(50% - .5px), rgba(0,229,255,.06) calc(50% + .5px), transparent calc(50% + .5px)),
        linear-gradient(0deg, transparent calc(50% - .5px), rgba(0,229,255,.06) calc(50% - .5px), rgba(0,229,255,.06) calc(50% + .5px), transparent calc(50% + .5px));
}

/* Canvas untuk jarum radar - PASTI KELIHATAN */
.radar-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 15;
    display: block;
    pointer-events: none;
}

/* Dots */
.radar-dots {
    position: absolute;
    inset: 0;
    z-index: 10;
}

.radar-dot {
    position: absolute;
    width: 6px;
    height: 6px;
    transform: translate(-50%, -50%) rotate(45deg);
    opacity: 0.3;
    transition: opacity 0.1s;
}

.radar-dot.active {
    opacity: 1;
    transform: translate(-50%, -50%) rotate(45deg) scale(2.5);
}

.radar-dot.purple { background: var(--purple); }
.radar-dot.red { background: var(--ap); }
.radar-dot.ai { background: var(--as); }
.radar-dot.lime { background: var(--aq); }

/* ============================================
   TOMBOL HEART & SPADE - DIPERBAIKI
   ============================================ */
.radar-ctas {
    padding: 16px 18px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.btn-vibe-gender {
    flex: 1;
    padding: 18px 8px;
    font-size: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border: 2px solid #000;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 5px 5px 0 #000;
    transition: transform 0.08s, box-shadow 0.08s;
    touch-action: manipulation;
}

.btn-vibe-gender:active {
    transform: translate(3px, 3px);
    box-shadow: 2px 2px 0 #000 !important;
}

.btn-vibe-gender.heart {
    background: linear-gradient(145deg, #ff2d55, #ff6b8b);
    color: #fff;
}

.btn-vibe-gender.spade {
    background: linear-gradient(145deg, #00e5ff, #4d7aff);
    color: #000;
}

.heart-icon {
    font-size: 38px;
    line-height: 1;
    animation: heartBeat 1.5s ease-in-out infinite;
}

.spade-icon {
    font-size: 42px;
    line-height: 1;
    transform: rotate(-5deg);
    animation: spadeGlow 2s ease-in-out infinite;
}

@keyframes heartBeat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}

@keyframes spadeGlow {
    0%,100% { opacity: 1; }
    50% { opacity: 0.8; }
}

.gender-tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    background: #000;
    color: var(--aq);
    padding: 4px 8px;
    margin-top: 4px;
}

.btn-whisper {
    width: 100%;
    padding: 14px 18px;
    background: transparent;
    border: 2px dashed var(--bd2);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    color: var(--txs);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.btn-whisper:active {
    border-color: var(--as);
    color: var(--as);
}

/* ============================================
   FILTER SECTION
   ============================================ */
.filter-sect {
    padding: 18px;
    border-bottom: 2px solid var(--bd);
}

.filter-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 14px;
}

.filter-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--txs);
    letter-spacing: 3px;
}

.match-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: var(--ap);
}

.vibe-slider {
    width: 100%;
    height: 3px;
    background: var(--bd2);
    -webkit-appearance: none;
}

.vibe-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    background: var(--ap);
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 2px var(--ap), 3px 3px 0 #000;
    cursor: pointer;
}

.mood-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    margin-top: 16px;
    padding-bottom: 4px;
}

.mood-chip {
    padding: 8px 16px;
    background: var(--bg);
    border: 2px solid var(--bd2);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--txs);
    cursor: pointer;
    box-shadow: 3px 3px 0 #000;
    white-space: nowrap;
}

.mood-chip.active {
    background: var(--ap);
    color: #fff;
}

/* ============================================
   SPILLS SECTION
   ============================================ */
.spills-sect {
    padding: 18px;
}

.sect-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 16px;
}

.sect-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
}

.sect-mood {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--as);
    border: 1px solid var(--bd);
    padding: 4px 12px;
}

.spill-card {
    background: var(--sf);
    border: 2px solid var(--bd2);
    margin-bottom: 14px;
    box-shadow: 4px 4px 0 #000;
}

.spill-head {
    display: flex;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 2px solid var(--bd);
}

.spill-user {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--txs);
}

.spill-mood {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    padding: 5px 10px;
    border: 2px solid;
}

.spill-mood.surviving { color: var(--ms); border-color: var(--ms); }
.spill-mood.thriving { color: var(--mt); border-color: var(--mt); }
.spill-mood.chaotic { color: var(--mc); border-color: var(--mc); }
.spill-mood.doom { color: var(--md); border-color: var(--md); }

.spill-body {
    padding: 16px;
    font-size: 15px;
}

.spill-actions {
    display: flex;
    border-top: 2px solid var(--bd);
}

.react-btn {
    flex: 1;
    padding: 12px 8px;
    background: transparent;
    border: none;
    border-right: 2px solid var(--bd);
    font-size: 16px;
    color: var(--txs);
    cursor: pointer;
}

.react-btn:last-child { border-right: none; }

.refresh-btn {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 2px dashed var(--bd2);
    color: var(--txs);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
    cursor: pointer;
}

/* ============================================
   BOTTOM NAV
   ============================================ */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    border-top: 2px solid var(--bd);
    padding-bottom: var(--sb);
    z-index: 100;
}

.nav-container {
    display: flex;
    height: 62px;
    max-width: 480px;
    margin: 0 auto;
}

.nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: var(--txm);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    cursor: pointer;
    border-right: 2px solid var(--bd);
}

.nav-item:last-child { border-right: none; }
.nav-item.active { color: var(--ap); }
.nav-item.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 3px;
    background: var(--ap);
}

/* ============================================
   CHAT ROOM
   ============================================ */
.chat-room {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 300;
    flex-direction: column;
}

.chat-room.on { display: flex; }

.chat-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 18px;
    padding-top: calc(12px + var(--st));
    border-bottom: 2px solid var(--bd);
    background: var(--sf);
}

.partner-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--as);
    background: rgba(0,229,255,0.1);
    padding: 6px 14px;
    border: 1px solid var(--bd);
}

.chat-timer {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--aq);
    background: var(--bg);
    padding: 8px 14px;
    border: 2px solid var(--bd);
    box-shadow: 3px 3px 0 #000;
}

.chat-close {
    width: 40px;
    height: 40px;
    background: var(--bg);
    border: 2px solid var(--bd);
    color: var(--txs);
    font-size: 18px;
    cursor: pointer;
    box-shadow: 3px 3px 0 #000;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
}

.chat-msg {
    max-width: 85%;
    margin-bottom: 12px;
}

.chat-msg.own { margin-left: auto; }
.chat-msg.other { margin-right: auto; }

.chat-bubble {
    padding: 12px 16px;
    border: 2px solid;
}

.own .chat-bubble {
    background: var(--ap);
    color: #fff;
    border-color: #000;
}

.other .chat-bubble {
    background: var(--sf);
    border-color: var(--bd2);
}

.system-msg .chat-bubble {
    background: transparent;
    border: 2px dashed var(--bd);
    color: var(--txs);
    text-align: center;
}

.chat-input-wrap {
    display: flex;
    gap: 10px;
    padding: 12px 18px;
    padding-bottom: calc(12px + var(--sb));
    border-top: 2px solid var(--bd);
    background: var(--sf);
}

.chat-input {
    flex: 1;
    padding: 13px 16px;
    background: var(--bg);
    border: 2px solid var(--bd2);
    color: var(--tx);
    font-family: 'Syne', sans-serif;
    outline: none;
}

.chat-input:focus { border-color: var(--ap); }

.chat-send {
    width: 48px;
    height: 48px;
    background: var(--ap);
    border: 2px solid #000;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 3px 3px 0 #000;
}

/* ============================================
   NOTIFICATION & WAITING
   ============================================ */
.notification-stack {
    position: fixed;
    top: calc(20px + var(--st));
    right: 20px;
    z-index: 2000;
}

.notification-card {
    background: var(--sf);
    border: 2px solid var(--bd2);
    padding: 16px;
    margin-bottom: 10px;
    box-shadow: 6px 6px 0 #000;
    border-left: 6px solid;
    animation: slideIn 0.3s;
}

.notification-card.heart { border-left-color: var(--heart); }
.notification-card.spade { border-left-color: var(--spade); }

@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

.waiting-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 1500;
    display: none;
    align-items: center;
    justify-content: center;
}

.waiting-overlay.show { display: flex; }

.waiting-box {
    background: var(--sf);
    border: 3px solid var(--as);
    padding: 30px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    box-shadow: 12px 12px 0 #000;
}

.waiting-timer-circle {
    width: 100px;
    height: 100px;
    border: 4px solid var(--aq);
    border-radius: 50%;
    margin: 20px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--aq);
}

.toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--tx);
    color: var(--bg);
    padding: 12px 22px;
    z-index: 600;
    opacity: 0;
    transition: all 0.25s;
    border: 2px solid #000;
    box-shadow: 4px 4px 0 #000;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.toast.error { background: var(--ap); color: #fff; }
</style>
</head>
<body>
<div class="app">
    <!-- HEADER -->
    <div class="header">
        <div class="logo">SP<span class="x">✕</span>LL</div>
        <div class="user-menu">
            <span class="user-badge" id="userNameDisplay">@guest</span>
            <div class="settings-icon" id="settingsIcon">⋮</div>
            <div class="settings-menu" id="settingsMenu">
                <div class="settings-item" id="logoutItem">Logout</div>
            </div>
        </div>
    </div>
    
    <!-- MAIN SCROLL -->
    <div class="scroll">
        <div class="radar-sect">
            <div class="radar-header">
                <span class="radar-label"><span class="radar-label-dot"></span>VIBE RADAR</span>
                <div class="online-badge">
                    <span class="online-dot"></span>
                    <span id="onlineCount">0</span> ONLINE
                </div>
            </div>
            
            <!-- RADAR WRAPPER -->
            <div class="radar-wrapper">
                <div class="radar-bezel">
                    <span class="corner-tr"></span><span class="corner-bl"></span>
                    <span class="radar-bezel-label">VIBE RADAR</span>
                    <span class="radar-bezel-range">0.5km / ∞</span>
                    <div class="radar-cont" id="radarCont">
                        <div class="radar-grid"></div>
                        <div class="radar-ring"></div>
                        <div class="radar-cross"></div>
                        <!-- CANVAS UNTUK JARUM - PASTI JALAN -->
                        <canvas class="radar-canvas" id="radarCanvas" width="300" height="300"></canvas>
                        <div class="radar-dots" id="radarDots"></div>
                    </div>
                </div>
            </div>
            
            <!-- TOMBOL HEART & SPADE -->
            <div class="radar-ctas">
                <div style="display: flex; gap: 10px; width: 100%;">
                    <!-- HEART BUTTON -->
                    <button class="btn-vibe-gender heart" id="vibeFemaleBtn">
                        <span class="heart-icon">❤️</span>
                        <span>YUK NGROBOL</span>
                        <span class="gender-tag">CARI CEWEK</span>
                    </button>
                    
                    <!-- SPADE BUTTON -->
                    <button class="btn-vibe-gender spade" id="vibeMaleBtn">
                        <span class="spade-icon">♠️</span>
                        <span>YUK BIKIN RUSUH</span>
                        <span class="gender-tag">CARI COWOK</span>
                    </button>
                </div>
                
                <!-- WHISPERER BUTTON -->
                <button class="btn-whisper" id="whisperBtn">
                    <span>✦ WHISPERER</span>
                    <span class="ws-new-badge">NEW</span>
                </button>
            </div>
        </div>
        
        <!-- FILTER SECTION -->
        <div class="filter-sect">
            <div class="filter-top">
                <span class="filter-title">KESELARASAN</span>
                <span class="match-pct" id="vibePct">87%</span>
            </div>
            <input type="range" class="vibe-slider" id="vibeSlider" min="0" max="100" value="87">
            <div class="mood-scroll" id="moodScroll">
                <button class="mood-chip active" data-mood="all">SEMUA</button>
                <button class="mood-chip" data-mood="surviving">😮‍💨 SURVIVING</button>
                <button class="mood-chip" data-mood="thriving">✨ THRIVING</button>
                <button class="mood-chip" data-mood="chaotic">🌀 CHAOTIC</button>
                <button class="mood-chip" data-mood="doom">🛌 DOOM</button>
            </div>
        </div>
        
        <!-- SPILLS SECTION -->
        <div class="spills-sect">
            <div class="sect-header">
                <div class="sect-title">
                    SPILL TERKINI
                    <span class="sect-mood" id="activeMoodDisplay">ALL</span>
                </div>
                <span class="sect-meta" id="feedMeta">8 spill</span>
            </div>
            <div id="spillsList">
                <div class="empty-state">
                    <span class="empty-icon">🍃</span>
                    <div class="empty-title">MEMUAT SPILL...</div>
                </div>
            </div>
            <button class="refresh-btn" id="refreshBtn">
                <span>↻</span>
                <span>SEDUH TEH BARU</span>
            </button>
        </div>
    </div>
    
    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <div class="nav-container">
            <div class="nav-item active" data-page="spill"><span class="nav-icon">✕</span><span>SPILL</span></div>
            <div class="nav-item" data-page="jejak"><span class="nav-icon">✦</span><span>JEJAK</span></div>
            <div class="nav-item" data-page="glitch"><span class="nav-icon">⚡</span><span>GLITCH</span></div>
            <div class="nav-item" data-page="cocomeo"><span class="nav-icon">〜</span><span>COCOMEO</span></div>
        </div>
    </nav>
</div>

<!-- NOTIFICATION STACK -->
<div class="notification-stack" id="notificationStack"></div>

<!-- WAITING OVERLAY -->
<div class="waiting-overlay" id="waitingOverlay">
    <div class="waiting-box">
        <div class="waiting-icon" id="waitingIcon">❤️</div>
        <div class="waiting-title" id="waitingTitle">Mencari teman...</div>
        <div class="waiting-timer-circle" id="waitingTimer">15</div>
        <button class="cancel-waiting" id="cancelWaiting">BATAL</button>
    </div>
</div>

<!-- CHAT ROOM -->
<div class="chat-room" id="chatRoom">
    <div class="chat-head">
        <div class="chat-info">
            <span class="partner-label" id="partnerLabel">STRANGER</span>
        </div>
        <div class="chat-timer" id="chatTimer">15:00</div>
        <button class="chat-close" id="closeChatBtn">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="chat-msg system-msg">
            <div class="chat-bubble">👥 Perfect stranger</div>
        </div>
    </div>
    <div class="chat-input-wrap">
        <input type="text" class="chat-input" id="chatInput" placeholder="ketik...">
        <button class="chat-send" id="sendButton">➤</button>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared-constants.js"></script>
<script src="/spill-generator.js"></script>
<script>
'use strict';

// ============================================
// KONFIGURASI
// ============================================
const $ = id => document.getElementById(id);
const rnd = n => Math.floor(Math.random() * n);

// State
let onlineUsers = [];
let waitingTimer = null;
let waitingSeconds = 15;
let chatPartner = null;
let chatTimeLeft = 900;
let timerInterval = null;

// AI Characters
const AI_CHARS = {
    heart: ['beby.manis', 'strawberry.shortcake', 'pretty.sad'],
    spade: ['sejuta.badai', 'satria.bajahitam', 'agak.koplak']
};

// ============================================
// UTILITY
// ============================================
function toast(msg, err = false) {
    const t = $('#toast');
    if (!t) return;
    t.textContent = msg;
    t.className = 'toast' + (err ? ' error' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

function closeModal(id) {
    const modal = $(id);
    if (modal) modal.classList.remove('on');
}

// ============================================
// ONLINE COUNT
// ============================================
function simulateOnlineUsers() {
    onlineUsers = [];
    const count = 8 + rnd(10);
    for (let i = 0; i < count; i++) {
        onlineUsers.push({ userId: 'user_' + i });
    }
    $('#onlineCount').textContent = onlineUsers.length;
}

// ============================================
// RADAR SEDERHANA - PASTI JALAN
// ============================================
let radarAngle = 0;
let radarAnimation = null;

function initRadar() {
    console.log('[Radar] Starting...');
    
    const canvas = $('#radarCanvas');
    if (!canvas) {
        console.error('[Radar] Canvas not found!');
        return;
    }
    
    // Set ukuran canvas
    const container = $('#radarCont');
    const rect = container.getBoundingClientRect();
    canvas.width = rect.width || 300;
    canvas.height = rect.height || 300;
    
    console.log('[Radar] Canvas size:', canvas.width, 'x', canvas.height);
    
    // Mulai animasi
    if (radarAnimation) cancelAnimationFrame(radarAnimation);
    drawRadar();
}

function drawRadar() {
    const canvas = $('#radarCanvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    const cx = w / 2;
    const cy = h / 2;
    const radius = Math.min(cx, cy) * 0.88;
    
    // Clear canvas dengan sedikit fade
    ctx.fillStyle = 'rgba(2,10,2,0.2)';
    ctx.fillRect(0, 0, w, h);
    
    // Update angle
    radarAngle += 0.02;
    if (radarAngle > Math.PI * 2) radarAngle -= Math.PI * 2;
    
    // Draw sweep (efek trail sederhana)
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(radarAngle);
    
    // Gradient untuk jarum
    const gradient = ctx.createLinearGradient(0, 0, radius, 0);
    gradient.addColorStop(0, 'rgba(0,229,255,1)');
    gradient.addColorStop(0.7, 'rgba(0,229,255,0.3)');
    gradient.addColorStop(1, 'rgba(0,229,255,0)');
    
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(radius, 0);
    ctx.strokeStyle = gradient;
    ctx.lineWidth = 3;
    ctx.stroke();
    
    // Draw center dot
    ctx.beginPath();
    ctx.arc(0, 0, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#00e5ff';
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = 15;
    ctx.fill();
    
    ctx.restore();
    
    // Lanjutkan animasi
    radarAnimation = requestAnimationFrame(drawRadar);
}

// ============================================
// VIBE CHECK - HEART & SPADE
// ============================================
function startVibeCheck(type) {
    console.log('[Vibe] Starting with type:', type);
    toast(`🔍 Mencari teman ${type === 'heart' ? 'cewek' : 'cowok'}...`, false);
    
    // Simulasi online users
    simulateOnlineUsers();
    
    // Tampilkan waiting overlay
    showWaitingOverlay(type);
}

function showWaitingOverlay(type) {
    const overlay = $('#waitingOverlay');
    const icon = $('#waitingIcon');
    const title = $('#waitingTitle');
    
    icon.textContent = type === 'heart' ? '❤️' : '♠️';
    title.textContent = type === 'heart' ? 'Mencari teman cewek...' : 'Mencari teman cowok...';
    
    overlay.classList.add('show');
    
    // Timer 15 detik
    waitingSeconds = 15;
    updateWaitingTimer();
    
    waitingTimer = setInterval(() => {
        waitingSeconds--;
        updateWaitingTimer();
        
        if (waitingSeconds <= 0) {
            clearInterval(waitingTimer);
            overlay.classList.remove('show');
            
            // Fallback ke AI
            toast('⏳ Pakai AI', false);
            startAIChat(type);
        }
    }, 1000);
}

function updateWaitingTimer() {
    const timer = $('#waitingTimer');
    if (timer) timer.textContent = waitingSeconds;
}

function startAIChat(type) {
    const chars = AI_CHARS[type] || AI_CHARS.heart;
    const name = chars[Math.floor(Math.random() * chars.length)];
    
    chatPartner = {
        name: name,
        isAI: true,
        type: type
    };
    
    openChatRoom(false);
}

function openChatRoom(isReal) {
    const room = $('#chatRoom');
    room.classList.add('on');
    
    $('#partnerLabel').textContent = isReal ? 'STRANGER' : 'AI';
    $('#chatTimer').textContent = '15:00';
    
    const msgs = $('#chatMessages');
    msgs.innerHTML = '<div class="chat-msg system-msg"><div class="chat-bubble">👥 Mulai ngobrol</div></div>';
    
    if (!isReal && chatPartner.isAI) {
        setTimeout(() => {
            const msg = chatPartner.type === 'heart' 
                ? 'Hai! Cerita dong' 
                : 'Yo! Lagi apa?';
            addAIMessage(msg);
        }, 1000);
    }
    
    startTimer();
}

function addAIMessage(text) {
    const msgs = $('#chatMessages');
    const div = document.createElement('div');
    div.className = 'chat-msg other';
    div.innerHTML = `<div class="chat-bubble">${text}</div>`;
    msgs.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth' });
}

function sendMsg() {
    const inp = $('#chatInput');
    const text = inp.value.trim();
    if (!text) return;
    
    const msgs = $('#chatMessages');
    const own = document.createElement('div');
    own.className = 'chat-msg own';
    own.innerHTML = `<div class="chat-bubble">${text}</div>`;
    msgs.appendChild(own);
    
    inp.value = '';
    own.scrollIntoView({ behavior: 'smooth' });
    
    if (chatPartner?.isAI) {
        setTimeout(() => {
            let reply = 'Hmm... gitu ya';
            addAIMessage(reply);
        }, 1000);
    }
}

function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (chatTimeLeft <= 0) {
            endChat();
            return;
        }
        chatTimeLeft--;
        const m = Math.floor(chatTimeLeft / 60);
        const s = chatTimeLeft % 60;
        $('#chatTimer').textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }, 1000);
}

function endChat() {
    clearInterval(timerInterval);
    const msgs = $('#chatMessages');
    msgs.innerHTML += '<div class="chat-msg system-msg"><div class="chat-bubble">⏰ Waktu habis</div></div>';
    setTimeout(() => closeChat(), 2000);
}

function closeChat() {
    $('#chatRoom').classList.remove('on');
    clearInterval(timerInterval);
    chatPartner = null;
    chatTimeLeft = 900;
}

// ============================================
// UI FUNCTIONS
// ============================================
function toggleSettings() {
    $('#settingsMenu').classList.toggle('show');
}

function logout() {
    if (confirm('Logout?')) {
        localStorage.clear();
        window.location.reload();
    }
}

function openWhisperer() {
    alert('Fitur Whisperer (Premium)');
}

// ============================================
// INIT
// ============================================
document.addEventListener('DOMContentLoaded', () => {
    console.log('[App] Starting...');
    
    // Username
    const saved = localStorage.getItem('spill_username');
    if (saved) {
        $('#userNameDisplay').textContent = '@' + saved;
    } else {
        const names = ['beby.manis', 'agak.koplak', 'pretty.sad'];
        const name = names[Math.floor(Math.random() * names.length)];
        localStorage.setItem('spill_username', name);
        $('#userNameDisplay').textContent = '@' + name;
    }
    
    // Online count
    simulateOnlineUsers();
    setInterval(simulateOnlineUsers, 30000);
    
    // Init radar
    setTimeout(() => {
        initRadar();
    }, 500);
    
    // ============================================
    // EVENT LISTENERS - HEART & SPADE BUTTONS
    // ============================================
    const heartBtn = $('#vibeFemaleBtn');
    const spadeBtn = $('#vibeMaleBtn');
    
    if (heartBtn) {
        heartBtn.onclick = function(e) {
            e.preventDefault();
            console.log('[Click] Heart button clicked');
            startVibeCheck('heart');
        };
        console.log('[App] Heart button listener attached');
    } else {
        console.error('[App] Heart button not found!');
    }
    
    if (spadeBtn) {
        spadeBtn.onclick = function(e) {
            e.preventDefault();
            console.log('[Click] Spade button clicked');
            startVibeCheck('spade');
        };
        console.log('[App] Spade button listener attached');
    } else {
        console.error('[App] Spade button not found!');
    }
    
    // Other buttons
    $('#whisperBtn').onclick = openWhisperer;
    $('#refreshBtn').onclick = () => {
        if (typeof window.seduhTehBaru === 'function') window.seduhTehBaru();
    };
    $('#settingsIcon').onclick = toggleSettings;
    $('#logoutItem').onclick = logout;
    $('#closeChatBtn').onclick = closeChat;
    $('#sendButton').onclick = sendMsg;
    $('#cancelWaiting').onclick = () => {
        clearInterval(waitingTimer);
        $('#waitingOverlay').classList.remove('show');
    };
    
    $('#chatInput').onkeydown = (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMsg();
        }
    };
    
    // Navigation
    document.querySelectorAll('.nav-item').forEach(item => {
        item.onclick = function(e) {
            e.preventDefault();
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            this.classList.add('active');
            
            const page = this.dataset.page;
            if (page === 'spill') window.location.href = 'spill.html';
            else window.location.href = page + '.html';
        };
    });
    
    // Spill generator
    if (typeof window.renderSpills === 'function') {
        window.renderSpills();
    }
    
    // Close settings when click outside
    document.onclick = (e) => {
        const menu = $('#settingsMenu');
        const icon = $('#settingsIcon');
        if (menu && icon && !icon.contains(e.target) && !menu.contains(e.target)) {
            menu.classList.remove('show');
        }
    };
    
    console.log('[App] Ready!');
});

// Expose functions
window.closeModal = closeModal;
</script>
</body>
</html>
