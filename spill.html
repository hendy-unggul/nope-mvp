<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz - AI Spill Generator Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .controls {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .control-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .control-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-test {
            background: #48bb78;
            margin-bottom: 12px;
        }

        .status {
            background: #f7fafc;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            font-size: 14px;
            color: #4a5568;
        }

        .spill-feed {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .spill-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .spill-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .spill-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .spill-meta {
            flex: 1;
        }

        .spill-author {
            font-weight: 600;
            color: #2d3748;
        }

        .spill-mood {
            font-size: 12px;
            color: #718096;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
        }

        .mood-surviving { color: #f56565; }
        .mood-thriving { color: #48bb78; }
        .mood-suffering { color: #9f7aea; }
        .mood-vibing { color: #4299e1; }

        .spill-content {
            font-size: 16px;
            line-height: 1.6;
            color: #2d3748;
            margin-bottom: 12px;
        }

        .spill-footer {
            display: flex;
            gap: 16px;
            font-size: 14px;
            color: #718096;
        }

        .reaction {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-toast {
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideOut {
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Blitz</h1>
            <p>AI-Powered Spill Generator Testing</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="spillCount">Jumlah Spills</label>
                <input type="number" id="spillCount" value="5" min="1" max="10">
            </div>

            <button class="btn btn-test" onclick="testAPI()">
                🔍 Test Connection
            </button>

            <button class="btn" id="generateBtn" onclick="generateSpills()">
                ✨ Generate Spills
            </button>

            <div class="status" id="status">
                Ready to generate spills
            </div>
        </div>

        <div class="spill-feed" id="spillFeed">
            <!-- Spills akan muncul di sini -->
        </div>
    </div>

    <!-- Import spill-generator.js -->
    <script src="spill-generator.js"></script>

    <script>
        // ============================================
        // UI FUNCTIONS
        // ============================================

        async function testAPI() {
            const status = document.getElementById('status');
            status.innerHTML = '🔍 Testing connection...';

            const result = await window.spillGenerator.testConnection();
            
            if (result) {
                status.innerHTML = `✅ Connection OK | API Key: ${result.hasKey ? 'Found' : 'Missing'}`;
            } else {
                status.innerHTML = '❌ Connection failed - check console';
            }
        }

        async function generateSpills() {
            const btn = document.getElementById('generateBtn');
            const status = document.getElementById('status');
            const count = parseInt(document.getElementById('spillCount').value);

            // Disable button
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Generating...';
            status.innerHTML = `⏳ Requesting ${count} spills from DeepSeek...`;

            // Generate
            const spills = await window.spillGenerator.generateSpills(count);

            // Re-enable button
            btn.disabled = false;
            btn.innerHTML = '✨ Generate Spills';

            if (spills) {
                status.innerHTML = `✅ Generated ${spills.length} spills successfully!`;
                displaySpills(spills);
            } else {
                status.innerHTML = '❌ Failed to generate spills - check console';
            }
        }

        function displaySpills(spills) {
            const feed = document.getElementById('spillFeed');
            
            // Clear existing spills
            feed.innerHTML = '';

            // Add new spills
            spills.forEach(spill => {
                const card = createSpillCard(spill);
                feed.appendChild(card);
            });
        }

        function createSpillCard(spill) {
            const card = document.createElement('div');
            card.className = 'spill-card';

            const initial = spill.author.charAt(0).toUpperCase();
            const moodEmoji = {
                'surviving': '😮‍💨',
                'thriving': '✨',
                'suffering': '💀',
                'vibing': '🎵'
            };

            card.innerHTML = `
                <div class="spill-header">
                    <div class="spill-avatar">${initial}</div>
                    <div class="spill-meta">
                        <span class="spill-author">${spill.author}</span>
                        <span class="spill-mood mood-${spill.mood}">
                            ${moodEmoji[spill.mood] || '💭'} ${spill.mood}
                        </span>
                    </div>
                </div>
                <div class="spill-content">${spill.content}</div>
                <div class="spill-footer">
                    <div class="reaction">💀 ${spill.reactions.skull}</div>
                    <div class="reaction">😭 ${spill.reactions.cry}</div>
                    <div class="reaction">🔥 ${spill.reactions.fire}</div>
                    <div class="reaction">🙃 ${spill.reactions.upside}</div>
                    <div class="reaction">📝 ${spill.wordCount} words</div>
                </div>
            `;

            return card;
        }

        // ============================================
        // AUTO TEST ON LOAD
        // ============================================
        window.addEventListener('load', () => {
            console.log('[UI] Page loaded, ready to test');
            // Uncomment untuk auto-test saat load
            // setTimeout(testAPI, 500);
        });
    </script>
</body>
</html>
