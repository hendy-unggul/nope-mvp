<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPILL — vibe radar</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ========== RESET ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #080808; color: #f0ece6; font-family: 'Syne', sans-serif; overflow: hidden; height: 100vh; }
        
        /* ========== APP LAYOUT ========== */
        .app { height: 100%; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 2px solid #222; background: #080808; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 34px; }
        .logo .x { color: #ff2d55; display: inline-block; animation: spin 4s infinite; }
        @keyframes spin { 95% { transform: rotate(180deg); } }
        
        .user-badge { font-family: 'DM Mono', monospace; background: #000; border: 2px solid #222; padding: 4px 8px; color: #00e5ff; }
        
        /* ========== SCROLL ========== */
        .scroll { flex: 1; overflow-y: auto; padding-bottom: 62px; }
        
        /* ========== RADAR ========== */
        .radar-sect { background: #0f0f0f; border-bottom: 2px solid #222; }
        .radar-header { display: flex; justify-content: space-between; padding: 14px 18px; }
        .radar-label { font-family: 'DM Mono', monospace; font-size: 10px; color: #00e5ff; display: flex; align-items: center; gap: 8px; }
        .label-dot { width: 8px; height: 8px; background: #00e5ff; transform: rotate(45deg); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }
        
        .online-badge { background: rgba(0,229,255,0.1); padding: 6px 12px; border: 1px solid #222; font-family: 'DM Mono', monospace; font-size: 11px; display: flex; align-items: center; gap: 6px; }
        .online-dot { width: 8px; height: 8px; background: #bfff00; transform: rotate(45deg); animation: pulse 1.5s infinite; }
        
        .radar-wrapper { padding: 0 18px 16px; }
        .radar-bezel { position: relative; padding: 4px; background: #080808; border: 2px solid #2e2e2e; box-shadow: 6px 6px 0 #000; }
        
        /* Container radar */
        .radar-cont { position: relative; width: 100%; aspect-ratio: 1; background: #020a02; overflow: hidden; }
        
        /* Grid & rings */
        .radar-grid { position: absolute; inset: 0; background-image: repeating-linear-gradient(0deg, rgba(0,229,255,0.04) 0px, transparent 1px, transparent 28px), repeating-linear-gradient(90deg, rgba(0,229,255,0.04) 0px, transparent 1px, transparent 28px); }
        .radar-ring { position: absolute; inset: 8%; border: 1px solid rgba(0,229,255,0.08); border-radius: 50%; }
        .radar-ring::before { content: ''; position: absolute; border-radius: 50%; border: 1px solid rgba(0,229,255,0.05); inset: 28%; }
        .radar-cross { position: absolute; inset: 0; background: linear-gradient(90deg, transparent calc(50% - 1px), rgba(0,229,255,0.06) calc(50% - 1px), rgba(0,229,255,0.06) calc(50% + 1px), transparent calc(50% + 1px)), linear-gradient(0deg, transparent calc(50% - 1px), rgba(0,229,255,0.06) calc(50% - 1px), rgba(0,229,255,0.06) calc(50% + 1px), transparent calc(50% + 1px)); }
        
        /* CANVAS - JARUM RADAR ASLI */
        .radar-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 10; display: block; }
        
        /* Dots */
        .radar-dots { position: absolute; inset: 0; z-index: 5; }
        .radar-dot { position: absolute; width: 6px; height: 6px; transform: translate(-50%,-50%) rotate(45deg); background: #00e5ff; opacity: 0.3; }
        
        /* ========== TOMBOL HEART & SPADE ========== */
        .radar-ctas { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 10px; }
        .gender-row { display: flex; gap: 10px; width: 100%; }
        
        .btn-gender {
            flex: 1;
            padding: 18px 8px;
            border: 2px solid #000;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 5px 5px 0 #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: 0.1s;
        }
        .btn-gender:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 #000; }
        
        .btn-heart { background: linear-gradient(145deg, #ff2d55, #ff6b8b); color: white; }
        .btn-spade { background: linear-gradient(145deg, #00e5ff, #4d7aff); color: black; }
        
        .gender-icon { font-size: 38px; }
        .gender-tag { font-family: 'DM Mono', monospace; font-size: 9px; background: #000; color: #bfff00; padding: 4px 8px; }
        
        .btn-whisper { width: 100%; padding: 14px; background: transparent; border: 2px dashed #2e2e2e; font-family: 'Syne', sans-serif; cursor: pointer; display: flex; justify-content: space-between; }
        
        /* ========== FILTER ========== */
        .filter-sect { padding: 18px; border-bottom: 2px solid #222; }
        .filter-top { display: flex; justify-content: space-between; margin-bottom: 14px; }
        .match-pct { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: #ff2d55; }
        .vibe-slider { width: 100%; height: 3px; background: #2e2e2e; -webkit-appearance: none; }
        .vibe-slider::-webkit-slider-thumb { width: 20px; height: 20px; background: #ff2d55; border: 3px solid #080808; box-shadow: 0 0 0 2px #ff2d55, 3px 3px 0 #000; cursor: pointer; -webkit-appearance: none; }
        
        .mood-scroll { display: flex; gap: 8px; overflow-x: auto; margin-top: 16px; }
        .mood-chip { padding: 8px 16px; background: #080808; border: 2px solid #2e2e2e; font-family: 'DM Mono', monospace; font-size: 11px; color: #777; cursor: pointer; white-space: nowrap; box-shadow: 3px 3px 0 #000; }
        .mood-chip.active { background: #ff2d55; color: white; }
        
        /* ========== SPILLS ========== */
        .spills-sect { padding: 18px; }
        .sect-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
        .sect-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; }
        #spillsList .empty-state { text-align: center; padding: 60px 20px; color: #777; }
        
        /* ========== BOTTOM NAV ========== */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #080808; border-top: 2px solid #222; }
        .nav-container { display: flex; height: 62px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 9px; color: #444; cursor: pointer; border-right: 2px solid #222; }
        .nav-item.active { color: #ff2d55; }
        
        /* ========== WAITING OVERLAY ========== */
        .waiting-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .waiting-box { background: #0f0f0f; border: 3px solid #00e5ff; padding: 30px; text-align: center; box-shadow: 12px 12px 0 #000; }
        .waiting-timer { width: 100px; height: 100px; border: 4px solid #bfff00; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: #bfff00; }
        
        /* ========== CHAT ROOM ========== */
        .chat-room { display: none; position: fixed; inset: 0; background: #080808; z-index: 500; flex-direction: column; }
        .chat-room.on { display: flex; }
        .chat-head { display: flex; justify-content: space-between; padding: 12px 18px; border-bottom: 2px solid #222; background: #0f0f0f; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 18px; }
        .chat-input-wrap { display: flex; gap: 10px; padding: 12px 18px; border-top: 2px solid #222; }
        .chat-input { flex: 1; padding: 13px; background: #080808; border: 2px solid #2e2e2e; color: white; }
        .chat-send { width: 48px; height: 48px; background: #ff2d55; border: 2px solid #000; color: white; font-size: 20px; cursor: pointer; }
        
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(100px); background: #f0ece6; color: #080808; padding: 12px 22px; z-index: 2000; opacity: 0; transition: 0.25s; border: 2px solid #000; box-shadow: 4px 4px 0 #000; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>

<script src="/spill-generator.js"></script>
<script>
// ============================================
// KODE ASLI - PASTI JALAN
// ============================================
(function() {
    'use strict';
    
    // ========== UTILITIES ==========
    const $ = id => document.getElementById(id);
    const rnd = n => Math.floor(Math.random() * n);
    
    // ========== STATE ==========
    let onlineUsers = [];
    let waitingTimer = null;
    let waitingSeconds = 15;
    let chatPartner = null;
    let chatTimeLeft = 900;
    let timerInterval = null;
    
    // ========== RADAR ASLI - PERSIS SEPERTI AWAL ==========
    let rdots = [];
    let needleA = 0, needleO = 0, phA = Math.random() * Math.PI * 2;
    const BASE_OM = (60/4 * Math.PI * 2) / (60 * 60);
    const TRAIL_CAP = 120;
    const trail = new Float32Array(TRAIL_CAP);
    let trailPtr = 0;
    const dotGlow = new Map();
    let radarRAF = null;
    let radarInterval = null;
    
    function initRadar() {
        const cv = $('#radarCanvas');
        const ct = $('#radarCont');
        if (!cv || !ct) return;
        
        const resize = () => {
            const r = ct.getBoundingClientRect();
            cv.width = r.width;
            cv.height = r.height;
        };
        resize();
        window.addEventListener('resize', resize);
        
        spawnDots();
        radarInterval = setInterval(() => {
            rdots.forEach(d => {
                d.vx = d.vx * 0.88 + (Math.random() - 0.5) * 0.3;
                d.vy = d.vy * 0.88 + (Math.random() - 0.5) * 0.3;
                d.x = Math.max(9, Math.min(91, d.x + d.vx));
                d.y = Math.max(9, Math.min(91, d.y + d.vy));
                if (d.el) {
                    d.el.style.left = d.x + '%';
                    d.el.style.top = d.y + '%';
                }
            });
        }, 100);
        
        needleA = Math.random() * Math.PI * 2;
        trail.fill(needleA);
        radarLoop(cv);
    }
    
    function spawnDots() {
        const c = $('#radarDots');
        if (!c) return;
        c.innerHTML = '';
        rdots = [];
        const types = ['ai', 'purple', 'red', 'lime'];
        for (let i = 0; i < 5 + rnd(5) + 2; i++) {
            const a = Math.random() * Math.PI * 2;
            const d = 12 + Math.random() * 70;
            const x = 50 + Math.cos(a) * d / 2;
            const y = 50 + Math.sin(a) * d / 2;
            const dot = document.createElement('div');
            const type = types[rnd(types.length)];
            dot.className = 'radar-dot ' + type;
            dot.style.left = x + '%';
            dot.style.top = y + '%';
            c.appendChild(dot);
            rdots.push({ el: dot, x, y, vx: 0, vy: 0, type, id: i });
        }
    }
    
    function radarLoop(cv) {
        const ctx = cv.getContext('2d');
        function draw() {
            const W = cv.width, H = cv.height;
            const cx = W / 2, cy = H / 2;
            const R = Math.min(cx, cy) * 0.88;
            
            if (!W || !H) {
                radarRAF = requestAnimationFrame(draw);
                return;
            }
            
            phA += 0.007;
            needleO += (BASE_OM * (1 + Math.sin(phA) * 0.35) - needleO) * 0.028;
            needleA = (needleA + needleO) % (Math.PI * 2);
            trail[trailPtr] = needleA;
            trailPtr = (trailPtr + 1) % TRAIL_CAP;
            
            ctx.fillStyle = 'rgba(2,10,2,0.18)';
            ctx.fillRect(0, 0, W, H);
            
            for (let i = 0; i < TRAIL_CAP - 1; i++) {
                const alpha = Math.pow(1 - i / TRAIL_CAP, 2.2) * 0.12;
                if (alpha < 0.002) break;
                const s = needleA - (i + 1) * needleO;
                const e = needleA - i * needleO;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, R, Math.min(s, e), Math.max(s, e), false);
                ctx.closePath();
                ctx.fillStyle = `rgba(0,229,255,${alpha})`;
                ctx.fill();
                ctx.restore();
            }
            
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(needleA);
            ctx.shadowColor = 'rgba(0,229,255,0.95)';
            ctx.shadowBlur = 12;
            const lg = ctx.createLinearGradient(0, 0, R, 0);
            lg.addColorStop(0, 'rgba(0,229,255,1)');
            lg.addColorStop(0.8, 'rgba(0,229,255,0.4)');
            lg.addColorStop(1, 'rgba(0,229,255,0)');
            ctx.beginPath();
            ctx.moveTo(3, 0);
            ctx.lineTo(R, 0);
            ctx.strokeStyle = lg;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.rect(-4, -4, 8, 8);
            ctx.fillStyle = '#00e5ff';
            ctx.fill();
            ctx.restore();
            
            rdots.forEach((d, di) => {
                const px = d.x / 100 * W;
                const py = d.y / 100 * H;
                let da = Math.atan2(py - cy, px - cx);
                if (da < 0) da += Math.PI * 2;
                let diff = needleA - da;
                if (diff < 0) diff += Math.PI * 2;
                const age = dotGlow.get(di) ?? 999;
                
                if (diff < 0.18 && age > 30) {
                    dotGlow.set(di, 0);
                    if (d.el) {
                        d.el.classList.add('active');
                        setTimeout(() => d.el?.classList.remove('active'), 800);
                    }
                } else {
                    dotGlow.set(di, age + 1);
                }
                
                if (age < 55) {
                    const t = age / 55;
                    const ga = (1 - t) * (1 - t) * 0.9;
                    if (ga < 0.01) return;
                    const col = d.type === 'purple' ? '191,90,242' :
                               d.type === 'red' ? '255,45,85' :
                               d.type === 'lime' ? '191,255,0' : '0,229,255';
                    const gr = ctx.createRadialGradient(px, py, 0, px, py, 16 * (1 - t) + 3);
                    gr.addColorStop(0, `rgba(${col},${ga})`);
                    gr.addColorStop(1, `rgba(${col},0)`);
                    ctx.beginPath();
                    ctx.arc(px, py, 16 * (1 - t) + 3, 0, Math.PI * 2);
                    ctx.fillStyle = gr;
                    ctx.fill();
                }
            });
            
            radarRAF = requestAnimationFrame(draw);
        }
        draw();
    }
    
    // ========== VIBE CHECK ==========
    function startVibeCheck(type) {
        console.log('[Vibe]', type);
        
        // Simulasi online users
        onlineUsers = Array(8 + rnd(10)).fill().map((_, i) => ({ userId: 'user_' + i }));
        $('#onlineCount').textContent = onlineUsers.length + ' ONLINE';
        
        // Tampilkan waiting overlay
        const overlay = $('#waitingOverlay');
        const icon = $('#waitingIcon');
        icon.textContent = type === 'heart' ? '❤️' : '♠️';
        overlay.style.display = 'flex';
        
        // Timer 15 detik
        waitingSeconds = 15;
        $('#waitingTimer').textContent = waitingSeconds;
        
        if (waitingTimer) clearInterval(waitingTimer);
        waitingTimer = setInterval(() => {
            waitingSeconds--;
            $('#waitingTimer').textContent = waitingSeconds;
            
            if (waitingSeconds <= 0) {
                clearInterval(waitingTimer);
                overlay.style.display = 'none';
                toast('⏳ Pakai AI', false);
                startAIChat(type);
            }
        }, 1000);
    }
    
    function startAIChat(type) {
        const names = type === 'heart' 
            ? ['beby.manis', 'strawberry.shortcake', 'pretty.sad']
            : ['sejuta.badai', 'satria.bajahitam', 'agak.koplak'];
        
        chatPartner = {
            name: names[Math.floor(Math.random() * names.length)],
            isAI: true,
            type: type
        };
        
        openChatRoom();
    }
    
    function openChatRoom() {
        const room = $('#chatRoom');
        room.classList.add('on');
        $('#partnerLabel').textContent = chatPartner?.isAI ? 'AI' : 'STRANGER';
        $('#chatTimer').textContent = '15:00';
        
        const msgs = $('#chatMessages');
        msgs.innerHTML = '<div style="text-align:center; color:#777; padding:20px;">👥 Perfect stranger</div>';
        
        if (chatPartner?.isAI) {
            setTimeout(() => {
                const msg = chatPartner.type === 'heart' ? 'Hai! Cerita dong' : 'Yo! Lagi apa?';
                const div = document.createElement('div');
                div.style.margin = '10px 0';
                div.style.padding = '12px 16px';
                div.style.background = '#0f0f0f';
                div.style.border = '2px solid #2e2e2e';
                div.style.maxWidth = '80%';
                div.style.alignSelf = 'flex-start';
                div.textContent = msg;
                msgs.appendChild(div);
            }, 1000);
        }
        
        startTimer();
    }
    
    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (chatTimeLeft <= 0) {
                endChat();
                return;
            }
            chatTimeLeft--;
            const m = Math.floor(chatTimeLeft / 60);
            const s = chatTimeLeft % 60;
            $('#chatTimer').textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }, 1000);
    }
    
    function endChat() {
        clearInterval(timerInterval);
        $('#chatMessages').innerHTML += '<div style="text-align:center; color:#777; padding:20px;">⏰ Waktu habis</div>';
        setTimeout(closeChat, 2000);
    }
    
    function closeChat() {
        $('#chatRoom').classList.remove('on');
        clearInterval(timerInterval);
        chatPartner = null;
        chatTimeLeft = 900;
    }
    
    function toast(msg, err) {
        const t = $('#toast');
        t.textContent = msg;
        t.className = 'toast' + (err ? ' error' : '');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }
    
    // ========== INIT ==========
    window.addEventListener('load', () => {
        console.log('[App] Starting...');
        
        // Username
        const saved = localStorage.getItem('spill_username') || 'beby.manis';
        $('#userNameDisplay').textContent = '@' + saved;
        
        // Online count
        onlineUsers = Array(21).fill().map((_, i) => ({ userId: 'user_' + i }));
        $('#onlineCount').textContent = onlineUsers.length + ' ONLINE';
        
        // Init radar
        setTimeout(initRadar, 100);
        
        // ===== TOMBOL HEART & SPADE - PAKAI ONCLICK =====
        const heartBtn = $('#vibeFemaleBtn');
        const spadeBtn = $('#vibeMaleBtn');
        
        if (heartBtn) {
            heartBtn.onclick = function(e) {
                e.preventDefault();
                console.log('❤️ HEART CLICKED');
                startVibeCheck('heart');
            };
        }
        
        if (spadeBtn) {
            spadeBtn.onclick = function(e) {
                e.preventDefault();
                console.log('♠️ SPADE CLICKED');
                startVibeCheck('spade');
            };
        }
        
        // Cancel waiting
        $('#cancelWaiting').onclick = () => {
            clearInterval(waitingTimer);
            $('#waitingOverlay').style.display = 'none';
        };
        
        // Close chat
        $('#closeChatBtn').onclick = closeChat;
        
        // Send message
        $('#sendButton').onclick = () => {
            const inp = $('#chatInput');
            const text = inp.value.trim();
            if (!text) return;
            
            const msgs = $('#chatMessages');
            const div = document.createElement('div');
            div.style.margin = '10px 0';
            div.style.padding = '12px 16px';
            div.style.background = '#ff2d55';
            div.style.color = 'white';
            div.style.border = '2px solid #000';
            div.style.maxWidth = '80%';
            div.style.alignSelf = 'flex-end';
            div.style.marginLeft = 'auto';
            div.textContent = text;
            msgs.appendChild(div);
            inp.value = '';
            
            if (chatPartner?.isAI) {
                setTimeout(() => {
                    const reply = document.createElement('div');
                    reply.style.margin = '10px 0';
                    reply.style.padding = '12px 16px';
                    reply.style.background = '#0f0f0f';
                    reply.style.border = '2px solid #2e2e2e';
                    reply.style.maxWidth = '80%';
                    reply.textContent = 'Hmm... gitu ya';
                    msgs.appendChild(reply);
                }, 1000);
            }
        };
        
        // Spill generator
        if (typeof window.renderSpills === 'function') {
            window.renderSpills();
        }
    });
})();
</script>
</body>
</html>
