<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPILL — vibe radar</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --bg: #080808;
            --sf: #0f0f0f;
            --sfe: #141414;
            --bd: #222;
            --bd2: #2e2e2e;
            --tx: #f0ece6;
            --txs: #777;
            --ap: #ff2d55;
            --as: #00e5ff;
            --aq: #bfff00;
            --gold: #ffd60a;
            --purple: #bf5af2;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--tx);
            font-family: 'Syne', sans-serif;
            font-size: 14px;
        }
        
        .app {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 2px solid var(--bd);
            background: var(--bg);
            flex-shrink: 0;
        }
        
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 34px;
            letter-spacing: 2px;
        }
        
        .logo .x {
            color: var(--ap);
            display: inline-block;
            animation: spinX 4s ease-in-out infinite;
        }
        
        @keyframes spinX {
            0%, 90%, 100% { transform: rotate(0); }
            95% { transform: rotate(180deg) scale(1.2); }
        }
        
        .user-badge {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--as);
            border: 2px solid var(--bd);
            padding: 4px 8px;
            background: #000;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        /* MAIN SCROLL AREA */
        .scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 70px;
        }
        
        /* RADAR SECTION */
        .radar-sect {
            background: var(--sf);
            border-bottom: 2px solid var(--bd);
        }
        
        .radar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px 12px;
        }
        
        .radar-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--as);
            letter-spacing: 3px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .radar-label-dot {
            width: 8px;
            height: 8px;
            background: var(--as);
            transform: rotate(45deg);
            animation: blink 1.2s step-end infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        
        .online-pill {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: #000;
            background: var(--aq);
            padding: 5px 12px;
            border: 2px solid #000;
            box-shadow: 3px 3px 0 #000;
        }
        
        .radar-wrapper {
            padding: 0 18px 16px;
        }
        
        .radar-bezel {
            position: relative;
            padding: 4px;
            background: var(--bg);
            border: 2px solid var(--bd2);
            box-shadow: 6px 6px 0 #000;
        }
        
        .radar-cont {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: #020a02;
            overflow: hidden;
        }
        
        .radar-grid {
            position: absolute;
            inset: 0;
            background-image: 
                repeating-linear-gradient(0deg, rgba(0,229,255,0.04) 0px, transparent 1px, transparent 28px),
                repeating-linear-gradient(90deg, rgba(0,229,255,0.04) 0px, transparent 1px, transparent 28px);
        }
        
        .radar-ring {
            position: absolute;
            inset: 8%;
            border: 1px solid rgba(0,229,255,0.08);
            border-radius: 50%;
        }
        
        .radar-dots {
            position: absolute;
            inset: 0;
            z-index: 10;
        }
        
        .radar-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            transform: translate(-50%, -50%);
            background: var(--as);
            opacity: 0.3;
            transition: opacity 0.1s;
        }
        
        .radar-dot.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(2);
            filter: brightness(2);
        }
        
        .radar-dot.purple { background: var(--purple); }
        .radar-dot.red { background: var(--ap); }
        .radar-dot.lime { background: var(--aq); }
        
        .btn-vibe-check {
            width: 100%;
            background: var(--ap);
            border: 2px solid #000;
            padding: 18px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 3px;
            color: #fff;
            cursor: pointer;
            box-shadow: 5px 5px 0 #000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }
        
        /* FILTER SECTION */
        .filter-sect {
            padding: 18px;
            border-bottom: 2px solid var(--bd);
        }
        
        .filter-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        
        .filter-title {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            color: var(--txs);
            letter-spacing: 3px;
        }
        
        .match-pct {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            color: var(--ap);
        }
        
        .vibe-slider {
            width: 100%;
            height: 3px;
            background: var(--bd2);
            -webkit-appearance: none;
            margin-bottom: 8px;
        }
        
        .vibe-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--ap);
            border: 3px solid var(--bg);
            box-shadow: 0 0 0 2px var(--ap), 3px 3px 0 #000;
            cursor: pointer;
        }
        
        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            color: var(--txm);
            margin: 6px 0 16px;
        }
        
        .mood-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin: 0 -18px;
            padding: 0 18px 4px;
        }
        
        .mood-chip {
            flex-shrink: 0;
            padding: 8px 16px;
            background: var(--bg);
            border: 2px solid var(--bd2);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--txs);
            cursor: pointer;
            box-shadow: 3px 3px 0 #000;
            transition: all 0.08s;
        }
        
        .mood-chip.active {
            background: var(--ap);
            border-color: #000;
            color: #fff;
        }
        
        .mood-chip:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #000;
        }
        
        /* SPILLS SECTION */
        .spills-sect {
            padding: 18px 18px 24px;
        }
        
        .sect-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 16px;
        }
        
        .sect-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 2px;
        }
        
        .sect-meta {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            color: var(--txm);
            letter-spacing: 2px;
        }
        
        .spill-card {
            background: var(--sf);
            border: 2px solid var(--bd2);
            margin-bottom: 14px;
            box-shadow: 4px 4px 0 #000;
        }
        
        .spill-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 2px solid var(--bd);
            background: var(--bg);
        }
        
        .spill-user {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--txs);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .spill-mood {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            padding: 5px 10px;
            text-transform: uppercase;
            border: 2px solid;
        }
        
        .spill-mood.surviving { color: #ff9f0a; border-color: #ff9f0a; }
        .spill-mood.thriving { color: #bfff00; border-color: #bfff00; }
        .spill-mood.chaotic { color: #00e5ff; border-color: #00e5ff; }
        .spill-mood.doom { color: #bf5af2; border-color: #bf5af2; }
        
        .spill-body {
            padding: 16px;
            font-size: 15px;
            line-height: 1.65;
            word-break: break-word;
        }
        
        .spill-actions {
            display: flex;
            border-top: 2px solid var(--bd);
            background: var(--bg);
        }
        
        .react-btn {
            flex: 1;
            padding: 12px 8px;
            background: transparent;
            border: none;
            border-right: 2px solid var(--bd);
            font-size: 16px;
            color: var(--txs);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: 'DM Mono', monospace;
        }
        
        .react-btn:last-child {
            border-right: none;
        }
        
        .react-btn.active {
            background: var(--ap);
            color: #fff;
        }
        
        .react-count {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
        }
        
        .refresh-btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 2px dashed var(--bd2);
            color: var(--txs);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            cursor: pointer;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }
        
        .empty-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: var(--txs);
            margin-bottom: 6px;
        }
        
        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg);
            border-top: 2px solid var(--bd);
            z-index: 100;
        }
        
        .nav-container {
            display: flex;
            justify-content: space-around;
            height: 62px;
            max-width: 480px;
            margin: 0 auto;
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: var(--txm);
            text-decoration: none;
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-right: 2px solid var(--bd);
            cursor: pointer;
        }
        
        .nav-item:last-child {
            border-right: none;
        }
        
        .nav-item.active {
            color: var(--ap);
            background: rgba(255,45,85,0.06);
        }
        
        .nav-icon {
            font-size: 20px;
        }
        
        /* TOAST */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--tx);
            color: var(--bg);
            padding: 12px 22px;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            z-index: 600;
            opacity: 0;
            transition: all 0.25s;
            pointer-events: none;
            border: 2px solid #000;
            box-shadow: 4px 4px 0 #000;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">SP<span class="x">✕</span>LL</div>
            <div class="user-badge" id="userNameDisplay">@anonymous</div>
        </div>
        
        <!-- MAIN SCROLL -->
        <div class="scroll">
            <!-- RADAR SECTION -->
            <div class="radar-sect">
                <div class="radar-header">
                    <span class="radar-label">
                        <span class="radar-label-dot"></span>VIBE RADAR
                    </span>
                    <span class="online-pill" id="onlineCount">21 ONLINE</span>
                </div>
                
                <div class="radar-wrapper">
                    <div class="radar-bezel">
                        <div class="radar-cont" id="radarCont">
                            <div class="radar-grid"></div>
                            <div class="radar-ring"></div>
                            <div class="radar-dots" id="radarDots"></div>
                        </div>
                    </div>
                </div>
                
                <div class="radar-ctas" style="padding: 0 18px 16px;">
                    <button class="btn-vibe-check" id="vibeCheckBtn">
                        <span>⬡</span><span>VIBE CHECK</span>
                    </button>
                </div>
            </div>
            
            <!-- FILTER SECTION -->
            <div class="filter-sect">
                <div class="filter-top">
                    <span class="filter-title">KESELARASAN</span>
                    <span class="match-pct" id="vibePct">87%</span>
                </div>
                <input type="range" class="vibe-slider" id="vibeSlider" min="0" max="100" value="87">
                <div class="slider-labels">
                    <span>HOMIE</span><span>SEMI</span><span>ALL</span>
                </div>
                
                <div class="mood-scroll" id="moodScroll">
                    <button class="mood-chip active" data-mood="all">SEMUA</button>
                    <button class="mood-chip" data-mood="surviving">😮‍💨 SURVIVING</button>
                    <button class="mood-chip" data-mood="thriving">✨ THRIVING</button>
                    <button class="mood-chip" data-mood="chaotic">🌀 CHAOTIC</button>
                    <button class="mood-chip" data-mood="doom">🛌 DOOM</button>
                </div>
            </div>
            
            <!-- SPILLS SECTION -->
            <div class="spills-sect">
                <div class="sect-header">
                    <span class="sect-title">SPILL TERKINI</span>
                    <span class="sect-meta" id="feedMeta">MEMUAT...</span>
                </div>
                
                <div id="spillsList">
                    <div class="empty-state">
                        <span class="empty-icon">🍃</span>
                        <div class="empty-title">MEMUAT SPILL...</div>
                    </div>
                </div>
                
                <button class="refresh-btn" id="refreshBtn">
                    <span>↻</span><span>SEDUH TEH BARU</span>
                </button>
            </div>
        </div>
        
        <!-- BOTTOM NAV -->
        <nav class="bottom-nav">
            <div class="nav-container">
                <div class="nav-item active" data-page="spill">
                    <span class="nav-icon">✕</span><span>SPILL</span>
                </div>
                <div class="nav-item" data-page="jejak">
                    <span class="nav-icon">✦</span><span>JEJAK</span>
                </div>
            </div>
        </nav>
    </div>
    
    <!-- TOAST -->
    <div class="toast" id="toast"></div>
    
    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="spill-generator.js"></script>
    <script>
        // Toast helper
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = msg;
            toast.className = 'toast' + (isError ? ' error' : '') + ' show';
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
        
        // Online count randomizer
        function updateOnlineCount() {
            const el = document.getElementById('onlineCount');
            if (el) el.textContent = (Math.floor(Math.random() * 25) + 18) + ' ONLINE';
        }
        
        // Simple radar animation
        function initRadar() {
            const container = document.getElementById('radarCont');
            const dotsContainer = document.getElementById('radarDots');
            if (!container || !dotsContainer) return;
            
            // Create random dots
            const colors = ['purple', 'red', 'lime'];
            for (let i = 0; i < 8; i++) {
                const dot = document.createElement('div');
                dot.className = 'radar-dot ' + colors[Math.floor(Math.random() * colors.length)];
                dot.style.left = (Math.random() * 80 + 10) + '%';
                dot.style.top = (Math.random() * 80 + 10) + '%';
                dotsContainer.appendChild(dot);
                
                // Random active animation
                setInterval(() => {
                    dot.classList.add('active');
                    setTimeout(() => dot.classList.remove('active'), 500);
                }, Math.random() * 5000 + 3000);
            }
        }
        
        // DOM Ready
        document.addEventListener('DOMContentLoaded', () => {
            // Set username
            const username = localStorage.getItem('jejak_username') || 
                           localStorage.getItem('username') || 
                           'anonymous';
            document.getElementById('userNameDisplay').textContent = '@' + username;
            
            // Init radar
            initRadar();
            
            // Online count
            updateOnlineCount();
            setInterval(updateOnlineCount, 30000);
            
            // Vibe slider
            const slider = document.getElementById('vibeSlider');
            const pct = document.getElementById('vibePct');
            if (slider && pct) {
                slider.addEventListener('input', (e) => {
                    pct.textContent = e.target.value + '%';
                });
            }
            
            // Refresh button
            document.getElementById('refreshBtn').addEventListener('click', () => {
                if (window.refreshFeed) window.refreshFeed();
                showToast('🔄 Menyeduh teh baru...');
            });
            
            // Mood chips
            document.querySelectorAll('.mood-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const mood = chip.dataset.mood;
                    if (window.filterMood) window.filterMood(mood);
                });
            });
            
            // Vibe check button
            document.getElementById('vibeCheckBtn').addEventListener('click', () => {
                showToast('🔍 Mencari partner... (demo)');
            });
            
            // Bottom nav
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const page = item.dataset.page;
                    if (page === 'jejak') {
                        window.location.href = '/jejak.html';
                    }
                });
            });
        });
    </script>
</body>
</html>
