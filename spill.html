<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPILL — vibe radar</title>
    
    <!-- NO CSP - Let browser handle everything -->
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --bg: #080808;
            --sf: #0f0f0f;
            --bd: #222;
            --bd2: #2e2e2e;
            --tx: #f0ece6;
            --txs: #777;
            --txm: #444;
            --ap: #ff2d55;
            --as: #00e5ff;
            --aq: #bfff00;
            --gold: #ffd60a;
            --purple: #bf5af2;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--tx);
            font-family: 'Syne', sans-serif;
        }
        
        .app {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 2px solid var(--bd);
            background: var(--bg);
        }
        
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 34px;
            letter-spacing: 2px;
        }
        
        .logo .x {
            color: var(--ap);
            display: inline-block;
            animation: spinX 4s ease-in-out infinite;
        }
        
        @keyframes spinX {
            0%, 90%, 100% { transform: rotate(0); }
            95% { transform: rotate(180deg) scale(1.2); }
        }
        
        .user-badge {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--as);
            border: 2px solid var(--bd);
            padding: 4px 8px;
            background: #000;
        }
        
        .scroll {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 70px;
        }
        
        .radar-sect {
            background: var(--sf);
            border-bottom: 2px solid var(--bd);
            padding: 18px;
        }
        
        .btn-vibe-check {
            width: 100%;
            background: var(--ap);
            border: 2px solid #000;
            padding: 18px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 3px;
            color: #fff;
            cursor: pointer;
            box-shadow: 5px 5px 0 #000;
            margin-top: 20px;
        }
        
        .btn-vibe-check:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0 #000;
        }
        
        .spills-sect {
            padding: 18px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--txs);
        }
        
        .bnav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg);
            border-top: 2px solid var(--bd);
        }
        
        .bnav-c {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            height: 62px;
        }
        
        .ni {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: var(--txm);
            text-decoration: none;
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-right: 2px solid var(--bd);
        }
        
        .ni:last-child {
            border-right: none;
        }
        
        .ni.act {
            color: var(--ap);
            background: rgba(255,45,85,0.06);
        }
        
        .nico {
            font-size: 20px;
        }
        
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--tx);
            color: var(--bg);
            padding: 12px 22px;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            z-index: 600;
            opacity: 0;
            transition: all 0.25s;
            border: 2px solid #000;
            box-shadow: 4px 4px 0 #000;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">SP<span class="x">✕</span>LL</div>
            <div class="user-badge" id="userNameDisplay">@loading...</div>
        </div>
        
        <div class="scroll">
            <div class="radar-sect">
                <h2 style="font-family: 'Bebas Neue', sans-serif; font-size: 28px; margin-bottom: 12px;">VIBE RADAR</h2>
                <p style="font-family: 'DM Mono', monospace; font-size: 11px; color: var(--txs); margin-bottom: 20px;">
                    Temukan user dengan vibe yang sama
                </p>
                <button class="btn-vibe-check" id="vibeCheckBtn">
                    <span>⬡ VIBE CHECK</span>
                </button>
            </div>
            
            <div class="spills-sect" id="spillsList">
                <div class="empty-state">
                    <div style="font-size: 48px; margin-bottom: 16px;">🍃</div>
                    <div style="font-family: 'Bebas Neue', sans-serif; font-size: 24px;">MEMUAT SPILL...</div>
                </div>
            </div>
        </div>
        
        <nav class="bnav">
            <div class="bnav-c">
                <a href="/spill.html" class="ni act"><span class="nico">✕</span><span>Spill</span></a>
                <a href="/jejak.html" class="ni"><span class="nico">✦</span><span>Jejak</span></a>
                <a href="/glitch.html" class="ni"><span class="nico">⚡</span><span>Glitch</span></a>
                <a href="/cocomeo.html" class="ni"><span class="nico">〜</span><span>Cocomeo</span></a>
            </div>
        </nav>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="spill-generator.js"></script>
    <script>
        console.log('[SPILL] Initializing ULTRA SIMPLE version...');
        
        // Toast helper
        function showToast(msg, duration = 2500) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }
        
        // VIBE CHECK - Ultra simple, use window.db from spill-generator.js
        async function doVibeCheck() {
            console.log('[VIBE CHECK] Starting...');
            showToast('🔍 Mencari partner...');
            
            // Wait for spill-generator to init
            if (!window.db) {
                console.warn('[VIBE CHECK] Waiting for DB...');
                setTimeout(doVibeCheck, 500);
                return;
            }
            
            const currentUser = localStorage.getItem('jejak_username') || 'test.user';
            console.log('[VIBE CHECK] Current:', currentUser);
            
            try {
                // SIMPLEST possible query
                const response = await window.db
                    .from('profiles')
                    .select('username');
                
                console.log('[VIBE CHECK] Response:', response);
                
                if (response.error) {
                    throw new Error(response.error.message);
                }
                
                const users = response.data || [];
                console.log('[VIBE CHECK] Users:', users);
                
                // Filter out current user
                const others = users.filter(u => u.username !== currentUser);
                
                if (others.length === 0) {
                    showToast('😔 Belum ada user lain', 3000);
                    return;
                }
                
                // Random pick
                const match = others[Math.floor(Math.random() * others.length)];
                const score = Math.floor(Math.random() * 30) + 70;
                
                console.log('[VIBE CHECK] Match:', match.username, score + '%');
                showToast(`✨ ${score}% match dengan @${match.username}!`, 3500);
                
            } catch (err) {
                console.error('[VIBE CHECK] Error:', err);
                showToast('❌ ' + err.message, 3000);
            }
        }
        
        // DOM Ready
        document.addEventListener('DOMContentLoaded', () => {
            // Set username
            const username = localStorage.getItem('jejak_username') || 'anonymous';
            document.getElementById('userNameDisplay').textContent = '@' + username;
            
            // Vibe check button
            document.getElementById('vibeCheckBtn').addEventListener('click', doVibeCheck);
            
            console.log('[SPILL] Ready!');
        });
    </script>
</body>
</html>
