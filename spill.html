function initSupabase() {
  try {
    if (!window.supabase?.createClient) return false;
    sbClient = window.supabase.createClient(JEJAK.SUPABASE_URL, JEJAK.SUPABASE_KEY);
    const sess = JEJAK.getSession();
    myUserId = sess.uid;
    myUsername = sess.username;
    
    if (!myUserId) {
      for (const k of ['user_id', 'jejak_user_id', 'uid']) {
        const v = localStorage.getItem(k); 
        if (v) { myUserId = v; break; }
      }
    }
    
    if (!myUsername) {
      for (const k of ['jejak_username', 'username']) {
        const v = localStorage.getItem(k); 
        if (v) { myUsername = v; break; }
      }
    }
    
    if (myUserId) {
      const el = $('userNameDisplay');
      if (el) el.textContent = '@' + (myUsername || 'anonymous');
    }
    return true;
  } catch (e) { 
    console.warn('[SPILL] Supabase init error:', e); 
    return false;
  }
}

// ============================================
// LOAD REAL ENTRIES
// ============================================
async function loadRealEntries() {
  if (!sbClient) { 
    renderMixedSpills();
    return; 
  }
  
  try {
    const { data, error } = await sbClient
      .from('entries')
      .select('id,user_id,content,mood,reactions,created_at,profiles!inner(username)')
      .order('created_at', { ascending: false })
      .limit(50);
    
    if (error) { 
      console.warn('[Real] Query error:', error.message); 
      renderMixedSpills();
      return; 
    }
    
    realEntries = (data || [])
      .filter(e => !(myUserId && e.user_id && e.user_id === myUserId))
      .map(e => ({
        id: e.id, 
        dbId: e.id, 
        author: e.profiles?.username || 'anonymous', 
        isReal: true,
        isAI: false,
        mood: e.mood || 'chaotic', 
        content: e.content || '',
        reactions: e.reactions || { skull:0, cry:0, fire:0, upside:0 },
        userReacted: null, 
        timestamp: new Date(e.created_at).getTime()
      }));
    
    console.log(`[Real] ✅ Loaded ${realEntries.length} real entries`);
    
    renderMixedSpills();
    
  } catch (err) { 
    console.warn('[Real] Error:', err.message); 
    renderMixedSpills();
  }
}

// ============================================
// SMART AI FILLER LOGIC - Max 10%
// ============================================
function renderMixedSpills() {
    const spillsContainer = $('spillsList');
    if (!spillsContainer) {
        console.warn('[Mixed] spillsList not found');
        return;
    }
    
    console.log('[Mixed] 🎨 Rendering with smart AI filler...');
    
    // Ambil data
    const realData = realEntries || [];
    const aiData = typeof window.getSpillPool === 'function' ? window.getSpillPool() : [];
    
    console.log(`[Mixed] 📊 Real: ${realData.length}, AI Pool: ${aiData.length}`);
    
    // SMART LOGIC: Hitung berapa AI yang dibutuhkan
    let aiNeeded = 0;
    
    if (realData.length < MIN_NATIVE_THRESHOLD) {
        // Fase traksi awal - AI sebagai filler utama
        aiNeeded = Math.max(8 - realData.length, 0);
        console.log(`[Mixed] 🚀 Traksi awal: butuh ${aiNeeded} AI entries`);
    } else {
        // Native user sudah memadai - AI max 10%
        const totalNeeded = 8;
        const maxAI = Math.ceil(totalNeeded * AI_MAX_PERCENTAGE);
        aiNeeded = Math.min(maxAI, aiData.length);
        console.log(`[Mixed] ✅ Native memadai: max ${maxAI} AI entries (10%)`);
    }
    
    // Ambil AI sesuai kebutuhan
    const selectedAI = aiData.slice(0, aiNeeded);
    
    // Gabungkan
    let allSpills = [...realData, ...selectedAI];
    
    // Shuffle random
    allSpills = allSpills.sort(() => Math.random() - 0.5);
    
    // Sort by timestamp
    allSpills.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    
    // Filter mood
    if (activeMoodFilter !== 'all') {
        allSpills = allSpills.filter(s => s.mood === activeMoodFilter);
    }
    
    // Ambil 8
    const toShow = allSpills.slice(0, 8);
    
    // Update meta (tanpa mention AI)
    const metaEl = $('feedMeta');
    if (metaEl) {
        metaEl.textContent = `${toShow.length} spills`;
    }
    
    console.log(`[Mixed] 📋 Showing ${toShow.length} (${toShow.filter(s=>s.isReal).length} real, ${toShow.filter(s=>s.isAI).length} filler)`);
    
    // Render
    if (toShow.length === 0) {
        spillsContainer.innerHTML = `
            <div class="empty-state">
                <span class="empty-icon">🍃</span>
                <div class="empty-title">BELUM ADA SPILL</div>
                <div class="empty-text">Tunggu sebentar...</div>
            </div>`;
        return;
    }
    
    spillsContainer.innerHTML = toShow.map(spill => `
        <div class="spill-card">
            <div class="spill-head">
                <span class="spill-user">@${esc(spill.author)}</span>
                <span class="spill-mood ${spill.mood}">${spill.mood}</span>
            </div>
            <div class="spill-body">${esc(spill.content)}</div>
            ${spill.isReal ? `
                <div class="spill-actions">
                    <button class="react-btn ${spill.userReacted === 'skull' ? 'active' : ''}" 
                            onclick="reactToSpill('${spill.id}', 'skull')">
                        <span>💀</span>
                        <span class="react-count">${spill.reactions.skull || 0}</span>
                    </button>
                    <button class="react-btn ${spill.userReacted === 'cry' ? 'active' : ''}"
                            onclick="reactToSpill('${spill.id}', 'cry')">
                        <span>😭</span>
                        <span class="react-count">${spill.reactions.cry || 0}</span>
                    </button>
                    <button class="react-btn ${spill.userReacted === 'fire' ? 'active' : ''}"
                            onclick="reactToSpill('${spill.id}', 'fire')">
                        <span>🔥</span>
                        <span class="react-count">${spill.reactions.fire || 0}</span>
                    </button>
                    <button class="react-btn ${spill.userReacted === 'upside' ? 'active' : ''}"
                            onclick="reactToSpill('${spill.id}', 'upside')">
                        <span>🙃</span>
                        <span class="react-count">${spill.reactions.upside || 0}</span>
                    </button>
                </div>
            ` : ''}
        </div>
    `).join('');
    
    console.log('[Mixed] ✅ Render complete');
}

// ============================================
// REACTIONS (Real entries only)
// ============================================
async function reactToSpill(spillId, reactionType) {
  const spill = realEntries.find(e => e.id === spillId);
  if (!spill) return;
  
  const wasActive = spill.userReacted === reactionType;
  
  if (wasActive) {
    spill.reactions[reactionType] = Math.max(0, (spill.reactions[reactionType] || 0) - 1);
    spill.userReacted = null;
  } else {
    if (spill.userReacted) {
      const old = spill.userReacted;
      spill.reactions[old] = Math.max(0, (spill.reactions[old] || 0) - 1);
    }
    spill.reactions[reactionType] = (spill.reactions[reactionType] || 0) + 1;
    spill.userReacted = reactionType;
  }
  
  renderMixedSpills();
  
  if (!sbClient) return;
  
  try {
    await sbClient.from('entries').update({ reactions: spill.reactions }).eq('id', spillId);
  } catch(e) { 
    console.error('[React] Error:', e); 
  }
}

// ============================================
// RADAR
// ============================================
let rdots = [], needleA = 0, needleO = 0, phA = Math.random()*Math.PI*2;
const BASE_OM = (60/4*Math.PI*2)/(60*60);
const TRAIL_CAP = 120;
const trail = new Float32Array(TRAIL_CAP);
let trailPtr = 0;
const dotGlow = new Map();

function initRadar() {
  const cv = $('radarCanvas'), ct = $('radarCont');
  if (!cv || !ct) return;
  
  const resize = () => { 
    const r = ct.getBoundingClientRect(); 
    cv.width = r.width; 
    cv.height = r.height; 
  };
  
  resize();
  window.addEventListener('resize', resize, { passive: true });
  
  spawnDots();
  
  radarInterval = setInterval(() => {
    rdots.forEach(d => {
      d.vx = d.vx*0.88+(Math.random()-0.5)*0.3;
      d.vy = d.vy*0.88+(Math.random()-0.5)*0.3;
      d.x = Math.max(9, Math.min(91, d.x+d.vx));
      d.y = Math.max(9, Math.min(91, d.y+d.vy));
      if (d.el) { d.el.style.left = d.x+'%'; d.el.style.top = d.y+'%'; }
    });
  }, 100);
  
  needleA = Math.random()*Math.PI*2; 
  trail.fill(needleA);
  radarLoop(cv);
}

function spawnDots() {
  const c = $('radarDots'); 
  if (!c) return;
  
  c.innerHTML = ''; 
  rdots = [];
  
  const types = ['ai','purple','red','lime'];
  
  for (let i = 0; i < 5+rnd(5)+2; i++) {
    const a = Math.random()*Math.PI*2, d = 12+Math.random()*70;
    const x = 50+Math.cos(a)*d/2, y = 50+Math.sin(a)*d/2;
    const dot = document.createElement('div');
    const type = types[rnd(types.length)];
    dot.className = 'radar-dot ' + type;
    dot.style.left = x+'%'; 
    dot.style.top = y+'%';
    c.appendChild(dot);
    rdots.push({ el:dot, x, y, vx:0, vy:0, type, id:i });
  }
}

function radarLoop(cv) {
  const ctx = cv.getContext('2d');
  
  function draw() {
    const W=cv.width, H=cv.height, cx=W/2, cy=H/2, R=Math.min(cx,cy)*0.88;
    
    if (!W||!H) { 
      radarRAF=requestAnimationFrame(draw); 
      return; 
    }
    
    phA+=0.007;
    needleO+=(BASE_OM*(1+Math.sin(phA)*0.35)-needleO)*0.028;
    needleA=(needleA+needleO)%(Math.PI*2);
    trail[trailPtr]=needleA; 
    trailPtr=(trailPtr+1)%TRAIL_CAP;
    
    ctx.fillStyle='rgba(2,10,2,.18)'; 
    ctx.fillRect(0,0,W,H);
    
    for (let i=0;i<TRAIL_CAP-1;i++) {
      const alpha=Math.pow(1-i/TRAIL_CAP,2.2)*0.12;
      if (alpha<0.002) break;
      
      const s=needleA-(i+1)*needleO, e=needleA-i*needleO;
      ctx.save(); 
      ctx.translate(cx,cy);
      ctx.beginPath(); 
      ctx.moveTo(0,0); 
      ctx.arc(0,0,R,Math.min(s,e),Math.max(s,e),false); 
      ctx.closePath();
      ctx.fillStyle=`rgba(0,229,255,${alpha})`; 
      ctx.fill(); 
      ctx.restore();
    }
    
    ctx.save(); 
    ctx.translate(cx,cy); 
    ctx.rotate(needleA);
    ctx.shadowColor='rgba(0,229,255,.95)'; 
    ctx.shadowBlur=12;
    
    const lg=ctx.createLinearGradient(0,0,R,0);
    lg.addColorStop(0,'rgba(0,229,255,1)'); 
    lg.addColorStop(0.8,'rgba(0,229,255,.4)'); 
    lg.addColorStop(1,'rgba(0,229,255,0)');
    
    ctx.beginPath(); 
    ctx.moveTo(3,0); 
    ctx.lineTo(R,0); 
    ctx.strokeStyle=lg; 
    ctx.lineWidth=2; 
    ctx.stroke();
    
    ctx.shadowBlur=20; 
    ctx.beginPath(); 
    ctx.rect(-4,-4,8,8); 
    ctx.fillStyle='#00e5ff'; 
    ctx.fill(); 
    ctx.restore();
    
    rdots.forEach((d,di) => {
      const px=d.x/100*W, py=d.y/100*H;
      let da=Math.atan2(py-cy,px-cx); 
      if(da<0)da+=Math.PI*2;
      
      let diff=needleA-da; 
      if(diff<0)diff+=Math.PI*2;
      
      const age=dotGlow.get(di)??999;
      
      if(diff<0.18&&age>30){ 
        dotGlow.set(di,0); 
        if(d.el){d.el.classList.add('active'); 
          setTimeout(()=>{if(d.el)d.el.classList.remove('active');},800);
        }
      } else { 
        dotGlow.set(di,age+1); 
      }
      
      if(age<55){
        const t=age/55, ga=(1-t)*(1-t)*0.9; 
        if(ga<0.01)return;
        
        const col=d.type==='purple'?'191,90,242':d.type==='red'?'255,45,85':d.type==='lime'?'191,255,0':'0,229,255';
        const gr=ctx.createRadialGradient(px,py,0,px,py,16*(1-t)+3);
        gr.addColorStop(0,`rgba(${col},${ga})`); 
        gr.addColorStop(1,`rgba(${col},0)`);
        
        ctx.beginPath(); 
        ctx.arc(px,py,16*(1-t)+3,0,Math.PI*2); 
        ctx.fillStyle=gr; 
        ctx.fill();
      }
    });
    
    radarRAF=requestAnimationFrame(draw);
  }
  
  radarRAF=requestAnimationFrame(draw);
}
