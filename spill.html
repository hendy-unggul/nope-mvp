<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Blitz - Spill Your Chaos</title>
    <style>
        :root {
            --bg: #0f0f23;
            --card: #1a1a2e;
            --tx: #e0e0e0;
            --txm: #a0a0a0;
            --accent: #667eea;
            --surviving: #f59e0b;
            --thriving: #10b981;
            --chaotic: #ef4444;
            --doom: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--tx);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--txm);
            font-size: 14px;
        }

        .controls {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .mood-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .mood-chip {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid var(--txm);
            background: transparent;
            color: var(--tx);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .mood-chip.active,
        .mood-chip:hover {
            border-color: var(--accent);
            background: var(--accent);
            transform: translateY(-2px);
        }

        .action-btns {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-secondary {
            background: var(--card);
            color: var(--tx);
            border: 2px solid var(--txm);
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .feed-meta {
            text-align: center;
            color: var(--txm);
            font-size: 12px;
            margin-bottom: 20px;
        }

        #spillsList {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .spill-card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid var(--accent);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .spill-head {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .spill-user {
            font-weight: 600;
            color: var(--accent);
        }

        .spill-mood {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .spill-mood.surviving {
            background: var(--surviving);
            color: #000;
        }

        .spill-mood.thriving {
            background: var(--thriving);
            color: #000;
        }

        .spill-mood.chaotic {
            background: var(--chaotic);
            color: #fff;
        }

        .spill-mood.doom {
            background: var(--doom);
            color: #fff;
        }

        .spill-words {
            font-size: 9px;
            color: var(--txm);
        }

        .spill-body {
            margin-bottom: 16px;
            line-height: 1.7;
            color: var(--tx);
        }

        .spill-actions {
            display: flex;
            gap: 12px;
        }

        .react-btn {
            background: transparent;
            border: 1px solid var(--txm);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--tx);
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .react-btn:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .react-count {
            font-size: 11px;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            .header h1 {
                font-size: 36px;
            }
            
            .action-btns {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Blitz</h1>
            <p>Spill Your Chaos, Embrace The Void</p>
        </div>

        <div class="controls">
            <div class="mood-filters">
                <button class="mood-chip active" data-mood="all" onclick="window.filterMood('all')">ALL</button>
                <button class="mood-chip" data-mood="surviving" onclick="window.filterMood('surviving')">SURVIVING</button>
                <button class="mood-chip" data-mood="thriving" onclick="window.filterMood('thriving')">THRIVING</button>
                <button class="mood-chip" data-mood="chaotic" onclick="window.filterMood('chaotic')">CHAOTIC</button>
                <button class="mood-chip" data-mood="doom" onclick="window.filterMood('doom')">DOOM</button>
            </div>

            <div class="action-btns">
                <button class="btn btn-secondary" onclick="window.seduhKeAtas()">⬆️ Seduh Ke Atas</button>
                <button class="btn btn-primary" onclick="window.seduhTehBaru()">🍵 Seduh Teh Baru</button>
            </div>
        </div>

        <div class="feed-meta" id="feedMeta">
            Loading...
        </div>

        <div id="spillsList">
            <!-- Spills akan muncul di sini -->
        </div>
    </div>

    <!-- Import spill-generator.js -->
    <script src="spill-generator.js"></script>
</body>
</html>
